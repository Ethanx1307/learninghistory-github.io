<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Workspace</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

.sidebar{
width:200px;
background:#2f2f2f;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
background:#444;
color:white;
cursor:pointer;
}

.content{
flex:1;
padding:20px;
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<div class="sidebar">

<button onclick="openPage('doc.html')">Document</button>
<button onclick="openPage('yt.html')">YouTube</button>

</div>

<div class="content">

<iframe id="frame"></iframe>

</div>

<script>

function openPage(page){
document.getElementById("frame").src = page
}

</script>

</body>
</html>
