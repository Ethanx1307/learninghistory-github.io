<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Hub</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
#quiz{max-width:720px;margin:60px auto;background:#111;padding:40px;border-radius:12px}
#quiz input,#quiz button{padding:10px;font-size:15px;margin-top:8px;border-radius:6px}
#feedback{font-weight:bold;margin-top:10px;color:#fbb}
#app{display:none}
.sidebar{width:220px;background:#1e1e2f;padding:20px;position:fixed;top:0;bottom:0}
.sidebar button{width:100%;margin-bottom:10px;padding:12px;background:#2c2f33;color:white;border:none;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:#40444b}
.content{margin-left:240px;padding:40px;min-height:100vh}
#chatBox{max-height:360px;overflow-y:auto;background:#313338;padding:10px;border-radius:6px;margin-bottom:8px}
.msg{margin-bottom:10px}
.time{font-size:11px;color:#aaa}
.name{font-weight:bold;color:#57a4ff}
input,button{padding:8px;margin-top:5px;border-radius:5px;border:none}
input{width:70%}
button{background:#5865f2;color:white;cursor:pointer}
button:hover{opacity:0.85}
.adminBox{background:#1e1e2f;padding:10px;border-radius:8px;margin-top:10px;display:flex;gap:20px}
.adminColumn{flex:1;background:#1e1e2f;padding:10px;border-radius:8px}
.banned{color:#ff6b6b;font-weight:bold}
.onlineUser{color:#4CAF50;font-weight:bold}
.offlineUser{color:#ff4d4d;font-weight:bold}
</style>
</head>
<body>

<section id="quiz">
<h1>Year 8 Maths Quiz</h1>
<p id="q"></p>
<input id="a">
<button onclick="submitQ()">Submit</button>
<div id="feedback"></div>
<p>Question <span id="n"></span>/50</p>
</section>

<section id="app">
<div class="sidebar">
<button onclick="openChat()">💬 Chat</button>
</div>
<div class="content" id="content">Welcome!</div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSy...",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// ===== STRONG USER ID =====
let userId = localStorage.getItem("userId");
if(!userId){
  userId = crypto.randomUUID();
  localStorage.setItem("userId", userId);
}

// Save user permanently
db.ref("knownUsers/"+userId).set({created:Date.now()});

// ===== BAN CHECK ON LOAD =====
db.ref("bans/"+userId).once("value").then(snap=>{
  if(snap.exists()){
    document.body.innerHTML="<h1 class='banned'>You are banned</h1>";
  }
});

// ===== QUIZ =====
let questions=[["7×8","56"],["45÷5","9"]];
let i=0;
function submitQ(){
  unlockApp();
}
function unlockApp(){
  quiz.style.display="none";
  app.style.display="block";
  openChat();
}

// ===== CHAT =====
let nickname = localStorage.getItem("nickname");

async function getNickname(){
  while(!nickname){
    let n = prompt("Choose your nickname:")?.trim();
    if(!n){alert("Enter a nickname"); continue;}

    const data = (await db.ref().once("value")).val() || {};
    const users = data.users || {};
    const bans = data.bans || {};

    let taken = false;

    for(const k in users){
      if(users[k].name.toLowerCase()===n.toLowerCase()) taken=true;
    }
    for(const k in bans){
      if(bans[k].name.toLowerCase()===n.toLowerCase()){
        alert("That name is banned");
        taken=true;
      }
    }

    if(taken){alert("Name taken"); continue;}

    nickname=n;
    localStorage.setItem("nickname",nickname);
  }
  return nickname;
}

async function openChat(){
  if((await db.ref("bans/"+userId).get()).exists()){
    document.body.innerHTML="<h1 class='banned'>You are banned</h1>";
    return;
  }

  nickname = await getNickname();

  content.innerHTML=`
  <h2>Chat</h2>
  <div id="chatBox"></div>
  <input id="msgInput"><button onclick="sendMsg()">Send</button>
  `;

  const chatBox=document.getElementById("chatBox");
  const msgInput=document.getElementById("msgInput");

  db.ref("users/"+userId).set({name:nickname,lastSeen:Date.now()});

  db.ref("chat").on("child_added",snap=>{
    const m=snap.val();
    const div=document.createElement("div");
    div.innerHTML=`<b>${m.name}</b>: ${m.text}`;
    chatBox.appendChild(div);
  });

  window.sendMsg=function(){
    if(!msgInput.value.trim()) return;

    db.ref("chat").push({
      name:nickname,
      text:msgInput.value,
      time:Date.now()
    });

    msgInput.value="";
  }
}
</script>
</body>
</html>
