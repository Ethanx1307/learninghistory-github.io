<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Year 8 Maths Practice</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}

/* STATUS */
#statusBanner{
  position:fixed;top:0;left:0;right:0;
  background:#f59e0b;color:black;
  text-align:center;padding:6px;
  display:none;z-index:9999
}

/* QUIZ */
#quiz{
  max-width:720px;margin:80px auto;background:#111;
  padding:40px;border-radius:12px
}
input,button{padding:10px;font-size:15px;margin-top:8px;border-radius:6px}
#feedback{font-weight:bold}

/* APP */
#app{display:none}
.sidebar{
  width:220px;background:#1e1e2f;padding:20px;
  position:fixed;top:0;bottom:0
}
.sidebar button{
  width:100%;margin-bottom:10px;padding:12px;
  background:#2c2f33;color:white;border:none;border-radius:8px
}
.sidebar button:hover{background:#40444b}
.content{
  margin-left:240px;padding:40px;
  min-height:100vh;background:#0f0f0f
}

/* CHAT */
.chat-msg{background:#2c2f33;padding:8px;margin-bottom:8px;border-radius:6px}
.time{font-size:.75em;color:#9ca3af}
.nick{color:#43b581;font-weight:bold}
#typing{font-size:.8em;color:#9ca3af;margin:6px 0}
#chatMessages{max-height:360px;overflow-y:auto}

/* DOC */
#editor{background:#1e1e2f;border-radius:8px;padding:16px}

/* PROXY */
.proxy-bar{display:flex;gap:10px;margin-bottom:10px}
.proxy-bar input{flex:1}
iframe{width:100%;height:420px;border:none;border-radius:8px}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain:"learning-history-1bfd5.firebaseapp.com",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"learning-history-1bfd5"
});
const db=firebase.database();
firebase.database().ref().keepSynced(true);
</script>
</head>

<body>

<div id="statusBanner">Offline</div>

<!-- QUIZ -->
<div id="quiz">
  <h1>Year 8 Maths Quiz</h1>
  <p id="q"></p>
  <input id="a" placeholder="Type answer">
  <button onclick="submit()">Submit</button>
  <div id="feedback"></div>
  <p>Question <span id="n"></span>/20</p>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <button onclick="openDoc()">📄 Document</button>
    <button onclick="openChat()">💬 Chat</button>
    <button onclick="openYT()">▶️ YouTube</button>
    <button onclick="openGames()">🎮 Games</button>
    <button onclick="openProxy()">🌐 Proxy</button>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
/* ===== OFFLINE ===== */
const banner=document.getElementById("statusBanner");
firebase.database().ref(".info/connected").on("value",s=>{
  if(!s.val()){
    banner.style.display="block";
    banner.textContent="⚠️ You are offline";
  }else{
    banner.textContent="✅ Back online";
    setTimeout(()=>banner.style.display="none",1200);
  }
});

/* ===== QUIZ ===== */
const Q=[
["7×8","56"],["45÷5","9"],["12²","144"],["√81","9"],
["15% of 200","30"],["-5+12","7"],["6²÷3","12"],
["Area 5×4","20"],["Perimeter square 6","24"],
["2x=18","9"],["9³","729"],["1/2 of 3/4","3/8"],
["10⁻¹","0.1"],["Mean of 2,4,6","4"],
["5x=25","5"],["√144","12"],["7+(-3)","4"],
["20% of 50","10"],["x+7=12","5"],["3×(4+2)","18"]
];
let i=0,score=0;
function load(){q.textContent=Q[i][0];n.textContent=i+1;a.value="";feedback.textContent=""}
load();
function submit(){
  const v=a.value.trim().toLowerCase();
  if(v==="opensesame"||v==="open sesame"){
    quiz.style.display="none";app.style.display="block";openChat();return;
  }
  if(v===Q[i][1]){score++;feedback.textContent="Correct!"}
  else feedback.textContent="Incorrect";
  i++;i<20?setTimeout(load,400):finish();
}
function finish(){
  quiz.innerHTML=`<h1>Score</h1><h2>${score}/20</h2><button onclick="location.reload()">Retry</button>`;
}

/* ===== DOCUMENT ===== */
function openDoc(){
  content.innerHTML=`
  <h2>Document</h2>
  <button id="read">Unlock Reading</button>
  <button id="edit">Unlock Editing</button>
  <div id="editor">Locked</div>`;
  const ed=editor;
  ed.contentEditable=false;

  read.onclick=()=>{
    if(prompt("Read code")!=="12345678h") return alert("Wrong");
    db.ref("doc").on("value",s=>ed.innerHTML=s.val()||"");
  };
  edit.onclick=()=>{
    if(prompt("Edit code")!=="1219") return alert("Wrong");
    ed.contentEditable=true;
    ed.oninput=()=>db.ref("doc").set(ed.innerHTML);
  };
}

/* ===== CHAT ===== */
let isAdmin=localStorage.isAdmin==="true";
function openChat(){
  let nick=localStorage.nick||prompt("Nickname")||"Anon";
  localStorage.nick=nick;

  db.ref("kicked/"+nick).once("value",s=>{
    if(s.exists()){
      content.innerHTML="<h2>You were kicked.</h2>";
      throw "kicked";
    }
  });

  content.innerHTML=`
  <h2>Chat</h2>
  <div id="typing"></div>
  <button onclick="adminLogin()">Admin</button>
  <button onclick="kickUser()" id="kickBtn" ${isAdmin?"":"disabled"}>Kick</button>
  <button onclick="clearChat()">Clear</button>
  <div id="chatMessages"></div>
  <input id="msg"><button onclick="send()">Send</button>`;

  const typingRef=db.ref("typing/"+nick);
  msg.oninput=()=>{
    typingRef.set(true);
    setTimeout(()=>typingRef.remove(),1200);
  };

  db.ref("typing").on("value",s=>{
    const t=s.val()||{};
    typing.textContent=Object.keys(t).filter(x=>x!==nick).join(", ")+" is typing…";
  });

  db.ref("chat").off();
  db.ref("chat").on("child_added",s=>{
    const m=s.val();
    const d=document.createElement("div");
    d.className="chat-msg";
    d.innerHTML=`<div class="time">${new Date(m.t).toLocaleString()}</div><div class="nick">${m.n}</div>${m.m}`;
    chatMessages.appendChild(d);
    chatMessages.scrollTop=chatMessages.scrollHeight;
  });

  window.send=()=>{
    if(!msg.value)return;
    typingRef.remove();
    db.ref("chat").push({n:nick,m:msg.value,t:Date.now()});
    msg.value="";
  };
}

/* ADMIN */
function adminLogin(){
  if(prompt("Admin code")==="Ethandagod@1"){
    isAdmin=true;
    localStorage.isAdmin="true";
    alert("Admin enabled");
    kickBtn.disabled=false;
  }
}
function clearChat(){
  if(!isAdmin) return alert("Admin only");
  db.ref("chat").remove();
}
function kickUser(){
  if(!isAdmin) return;
  const u=prompt("Kick username");
  if(u) db.ref("kicked/"+u).set(true);
}

/* ===== OTHER ===== */
function openYT(){content.innerHTML="<p>YouTube here</p>"}
function openGames(){window.open("game.html","_blank")}
function openProxy(){
  content.innerHTML=`
  <h2>Research Viewer</h2>
  <div class="proxy-bar">
    <input id="u" value="https://geography.callcentercuritiba.com.br/">
    <button onclick="f.src=u.value">Go</button>
  </div>
  <iframe id="f" src="https://geography.callcentercuritiba.com.br/"></iframe>`;
}
</script>
</body>
</html>
