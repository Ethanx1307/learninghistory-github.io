<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Hub</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;overflow-x:hidden}
#home,#quiz,#app{display:none}
#home{max-width:720px;margin:60px auto;text-align:center}
.home-btn{padding:50px 80px;margin:30px;font-size:30px;border-radius:12px;background:#5865f2;color:white;cursor:pointer;display:inline-block}
.home-btn:hover{opacity:0.85}
#quiz{max-width:720px;margin:40px auto;background:#111;padding:40px;border-radius:12px;text-align:center}
#quiz input,#quiz button{padding:10px;font-size:15px;margin-top:8px;border-radius:6px}
#feedback{font-weight:bold;margin-top:10px;color:#fbb}
.sidebar{width:220px;background:#1e1e2f;padding:20px;position:fixed;top:0;bottom:0}
.sidebar button{width:100%;margin-bottom:10px;padding:12px;background:#2c2f33;color:white;border:none;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:#40444b}
.content{margin-left:240px;padding:40px;min-height:100vh;background:#0f0f0f}
#chatBox{max-height:360px;overflow-y:auto;background:#313338;padding:10px;border-radius:6px;margin-bottom:8px}
.msg{margin-bottom:10px}
.time{font-size:11px;color:#aaa}
.name{font-weight:bold;color:#57a4ff}
input,button{padding:8px;margin-top:5px;border-radius:5px;border:none}
input{width:70%}
button{background:#5865f2;color:white;cursor:pointer}
button:hover{opacity:0.85}
#editor{background:#1e1e2f;border-radius:8px;padding:16px;min-height:200px}
iframe{width:100%;height:300px;border-radius:8px;border:none}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;z-index:999}
#bigText{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:bold;display:none;z-index:1000;text-align:center}
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div id="bigText">AWESOME!<br>YOU COMPLETED THE QUIZZES!</div>

<!-- HOME SCREEN -->
<section id="home">
<h1>Choose a Quiz</h1>
<div class="home-btn" onclick="startQuiz('math')">Math</div>
<div class="home-btn" onclick="startQuiz('science')">Science</div>
</section>

<!-- QUIZ -->
<section id="quiz">
<h1 id="quizTitle"></h1>
<p id="q"></p>
<input id="a" placeholder="Type answer here">
<br>
<button onclick="submitQ()">Submit</button>
<div id="feedback"></div>
<p>Question <span id="n"></span>/50</p>
</section>

<!-- HIDDEN WEBSITE APP -->
<section id="app">
<div class="sidebar">
<button onclick="openDoc()">📄 Document</button>
<button onclick="openChat()">💬 Chat</button>
<button onclick="openYT()">▶️ YouTube</button>
<button onclick="openGames()">🎮 Games</button>
<button onclick="openProxy()">🌐 Proxy</button>
</div>
<div class="content" id="content">Welcome!</div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey:"AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain:"learning-history-1bfd5.firebaseapp.com",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"learning-history-1bfd5",
  storageBucket:"learning-history-1bfd5.appspot.com",
  messagingSenderId:"231811778288",
  appId:"1:231811778288:web:d112859a8bc6143fffa435"
});
const db=firebase.database();

/* ===== QUIZ DATA ===== */
const mathQuestions = [
["2+2","4"],["3+5","8"],["7-4","3"],["6×3","18"],["20÷4","5"],
["12+15","27"],["7×8","56"],["45÷5","9"],["3²","9"],["√81","9"],
["5x=20","4"],["x+7=15","8"],["2x+5=17","6"],["x²=49","7"],["Area 6×4","24"],
["Perimeter square 7","28"],["15% of 200","30"],["-5+12","7"],["-3×6","-18"],
["Derivative of x²","2x"],["Integral of 2x","x²"],["Limit x→∞ of 1/x","0"],
["Solve x²=2","√2"],["Factor x²-25","(x-5)(x+5)"],["Simplify (x²×x³)","x⁵"],
["Differentiate 3x³","9x²"],["Integrate 6x²","2x³"],["Solve: e⁰","1"],
["ln(e)","1"],["Solve: x²-4x+3=0","x=1,3"],["Derivative of sin(x)","cos(x)"],
["Integral of cos(x)","sin(x)"],["Solve: 2x+3=11","4"],["x³=27","3"],
["tan(45°)","1"],["x²+1=0","no real"],["Expand (x+3)²","x²+6x+9"],
["Second derivative x³","6x"],["Limit x→0 (sin x)/x","1"],["Solve ∫0→1 x² dx","1/3"],
["Derivative ln(x)","1/x"],["Integral 2x dx","x²"],["Factor x²-16","(x-4)(x+4)"],
["Solve: 5x-20=0","4"],["x²-9=0","±3"],["What is my favourite colour?","green"]
];

const scienceQuestions = [
["Water boils at?","100"],["Freezing point of water?","0"],["H2O is?","water"],
["Force formula?","mass*acceleration"],["Earth revolves around?","sun"],
["Speed of light (approx km/s)","300000"],["Periodic table symbol for oxygen?","O"],
["pH of pure water","7"],["What planet is red?","mars"],["Energy unit","joule"],
["States of matter","solid,liquid,gas"],["Chemical symbol gold?","Au"],["Newton's 1st law?","inertia"],
["Electric current unit","ampere"],["Light travels faster in?","vacuum"],["Atomic number of hydrogen","1"],
["Electron charge","-1.6e-19"],["Density formula","mass/volume"],["Boiling point of ethanol","78"],
["Photosynthesis formula?","CO2+H2O→O2+C6H12O6"],["Cell powerhouse","mitochondria"],["DNA full form","deoxyribonucleic acid"],
["pH<7 is?","acidic"],["pH>7 is?","basic"],["Newton's 2nd law","F=ma"],["Unit of frequency","hertz"],
["Acceleration unit","m/s²"],["Gravity (approx)","9.8"],["Evaporation requires?","energy"],
["Solubility measured in?","g/100ml"],["Speed unit","m/s"],["Light unit","lux"],["Sound unit","decibel"],
["Force unit","newton"],["Magnet unit","tesla"],["Wave unit","hz"],["Voltage unit","volt"],["Current unit","ampere"],
["Resistance unit","ohm"],["Capacitor unit","farad"],["Inductor unit","henry"],["Pressure unit","pascal"],
["Temperature unit","celsius"],["What is my favourite colour?","green"]
];

/* ===== GLOBALS ===== */
let questions=[],i=0,score=0,currentQuiz="";
const q=document.getElementById("q"),a=document.getElementById("a"),
feedback=document.getElementById("feedback"),n=document.getElementById("n");

/* ===== START QUIZ ===== */
function startQuiz(type){
  currentQuiz=type;
  questions=(type==="math"?mathQuestions.slice():scienceQuestions.slice());
  questions.sort(()=>Math.random()-0.5);
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="block";
  document.getElementById("quizTitle").textContent=type==="math"?"Math Quiz":"Science Quiz";
  i=0;score=0;
  loadQ();
}

function loadQ(){
  q.textContent=questions[i][0];
  n.textContent=i+1;
  a.value="";
  feedback.textContent="";
}

function submitQ(){
  let v=a.value.trim().toLowerCase().replace(/\s+/g," ");
  if(v==="opensesame"||v==="open sesame"){unlockApp(); return;}
  let ans=questions[i][1].toLowerCase();
  if(v===ans){score++;feedback.textContent="Correct!"}else{feedback.textContent="Incorrect"}
  i++;
  if(i<50) setTimeout(loadQ,400);
  else finishQ();
}

function finishQ(){
  quiz.innerHTML=`<h1>Score</h1><h2>${score}/50</h2>`;
  if(score===50) party();
}

/* ===== UNLOCK HIDDEN WEBSITE ===== */
function unlockApp(){
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="none";
  document.getElementById("app").style.display="block";
  openChat();
}

/* ===== CONFETTI / AWARD ===== */
function party(){
  const c=document.getElementById("confetti"),ctx=c.getContext("2d");
  c.width=innerWidth;c.height=innerHeight;c.style.display="block";
  document.getElementById("bigText").style.display="block";
  let p=[...Array(200)].map(()=>({x:Math.random()*c.width,y:Math.random()*-c.height,s:Math.random()*3+2}));
  (function d(){ctx.clearRect(0,0,c.width,c.height);
    p.forEach(o=>{ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;ctx.fillRect(o.x,o.y,6,6);o.y+=o.s;if(o.y>c.height)o.y=0});
    requestAnimationFrame(d);
  })();
}

/* ===== DOCUMENTS / CHAT / YOUTUBE / PROXY ===== */
// (keep the previous logic for saving documents, premium, chat Enter-send, spam warning, YouTube embed, games, proxy)

document.getElementById("home").style.display="block";
</script>
</body>
