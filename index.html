<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Hub</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
#quiz{max-width:720px;margin:60px auto;background:#111;padding:40px;border-radius:12px}
#quiz input,#quiz button{padding:10px;font-size:15px;margin-top:8px;border-radius:6px}
#feedback{font-weight:bold;margin-top:10px}
.correct{color:#4caf50}
.incorrect{color:#f44336}
#app{display:none}
.sidebar{width:220px;background:#1e1e2f;padding:20px;position:fixed;top:0;bottom:0}
.sidebar button{width:100%;margin-bottom:10px;padding:12px;background:#2c2f33;color:white;border:none;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:#40444b}
.content{margin-left:240px;padding:40px;min-height:100vh}
#chatBox{max-height:360px;overflow-y:auto;background:#313338;padding:10px;border-radius:6px;margin-bottom:8px}
.msg{margin-bottom:10px}
.time{font-size:11px;color:#aaa}
.name{font-weight:bold;color:#57a4ff}
input,button{padding:8px;margin-top:5px;border-radius:5px;border:none}
input{width:70%}
button{background:#5865f2;color:white;cursor:pointer}
button:hover{opacity:0.85}
iframe{border:none;border-radius:12px;width:100%;height:500px}
</style>
</head>
<body>

<!-- QUIZ -->
<section id="quiz">
<h1>Year 8 Maths Quiz</h1>
<p id="q"></p>
<input id="a" placeholder="Type answer here">
<button onclick="submitQ()">Submit</button>
<div id="feedback"></div>
<p>Question <span id="n"></span>/50</p>
</section>

<!-- APP -->
<section id="app">
<div class="sidebar">
<button onclick="openDoc()">📄 Document</button>
<button onclick="openChat()">💬 Chat</button>
<button onclick="openYT()">▶️ YouTube</button>
<button onclick="openGames()">🎮 Games</button>
<button onclick="openProxy()">🌐 Proxy</button>
</div>
<div class="content" id="content">Welcome!</div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* ===== FIREBASE ===== */
const firebaseConfig={
  apiKey:"AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain:"learning-history-1bfd5.firebaseapp.com",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"learning-history-1bfd5",
  storageBucket:"learning-history-1bfd5.appspot.com",
  messagingSenderId:"231811778288",
  appId:"1:231811778288:web:d112859a8bc6143fffa435"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const userRef=db.ref("usernames");
const allUsersRef=db.ref("allUsers");

/* ===== FLAGS ===== */
let isAdmin=false;
let isBanned=false;
let nickname=localStorage.getItem("nickname");

/* ===== ONE-TIME FRESH START ===== */
(async function freshStart(){
  await allUsersRef.remove();
  await userRef.remove();
  localStorage.clear();
})();

/* ===== BANNED DISPLAY ===== */
function showBanned(){
  quiz.style.display="none";
  document.getElementById("app").style.display="none";
  document.body.innerHTML=`<h1 style="text-align:center;margin-top:40vh">🚫 You are banned</h1>`;
}

/* ===== LISTEN FOR BANS LIVE ===== */
db.ref("bans").on("value",snap=>{
  const bans=snap.val()||{};
  const lname=nickname?.toLowerCase();
  if(lname && bans[lname]){
    isBanned=true;
    showBanned();
  }
});

/* ===== QUIZ ===== */
let questions=[["7×8","56"],["45÷5","9"],["12²","144"],["√81","9"],
["15% of 200","30"],["-5+12","7"],["6²÷3","12"]].sort(()=>Math.random()-0.5);

let i=0,score=0;
const q=document.getElementById("q"),
      a=document.getElementById("a"),
      feedback=document.getElementById("feedback"),
      n=document.getElementById("n");

function loadQ(){
  q.textContent=questions[i][0];
  n.textContent=i+1;
  a.value="";
  feedback.textContent="";
}
loadQ();

function submitQ(){
  const v=a.value.trim().toLowerCase();
  if(v==="etx12345678h"){ isAdmin=true; unlockApp(); return; }
  if(v.replace(/\s+/g,'')==="opensesame"){ unlockApp(); return; }

  if(v===questions[i][1]){
    feedback.textContent="Correct!"; feedback.className="correct"; score++;
  } else{
    feedback.textContent="Incorrect!"; feedback.className="incorrect";
  }

  i++; if(i<questions.length) setTimeout(loadQ,400);
  else feedback.textContent=`Finished! Score: ${score}/${questions.length}`;
}
a.addEventListener("keydown", e => { if(e.key==="Enter") submitQ(); });

/* ===== UNLOCK APP & USERNAME PROMPT ===== */
async function unlockApp(){
  if(isBanned){showBanned(); return;}
  quiz.style.display="none";
  document.getElementById("app").style.display="block";

  while(!nickname){
    let n=prompt("Enter a unique username:");
    if(!n) continue;
    n=n.trim(); if(!n) continue;
    const lname=n.toLowerCase();
    const snap = await allUsersRef.child(lname).get();
    if(snap.exists()){
      alert("Username already taken. Choose another.");
      continue;
    }
    const banSnap = await db.ref("bans/"+lname).get();
    if(banSnap.exists()){ alert("This username is banned!"); continue; }

    nickname=n;
    await allUsersRef.child(lname).set(true);
    await userRef.child(lname).set(true);
    userRef.child(lname).onDisconnect().remove();
    localStorage.setItem("nickname",nickname);
    break;
  }

  openChat();
}

/* ===== CHAT ===== */
async function openChat(){
  if(isBanned){content.innerHTML="<h2>🚫 You are banned from chat</h2>"; return;}
  content.innerHTML=`
  <h2>Chat</h2>
  <button onclick="changeName()">Change Username</button>
  <button onclick="clearChat()">Clear Chat</button>
  ${isAdmin?`<button onclick="banUser()">Ban</button><button onclick="unbanUser()">Unban</button>`:""}
  <div id="chatBox"></div>
  <input id="msgInput" placeholder="Message">
  <button onclick="sendMsg()">Send</button>
  `;
  const chatBox=document.getElementById("chatBox");
  const msgInput=document.getElementById("msgInput");
  chatBox.innerHTML="";
  db.ref("chat").off();
  db.ref("chat").on("child_added",snap=>{
    const m=snap.val();
    const div=document.createElement("div");
    div.className="msg";
    div.innerHTML=`<div class="time">${formatTime(m.time)}</div><span class="name">${m.name}</span>: ${m.text}`;
    chatBox.appendChild(div);
    chatBox.scrollTop=chatBox.scrollHeight;
  });
  msgInput.addEventListener("keydown", e => { if(e.key==="Enter") sendMsg(); });
}

function sendMsg(){
  const msg=document.getElementById("msgInput").value.trim();
  if(!msg) return;
  db.ref("chat").push({name:nickname,text:msg,time:Date.now()});
  document.getElementById("msgInput").value="";
}

/* ===== CHANGE NAME ===== */
async function changeName(){
  if(prompt("Enter code")!=="4293") return alert("Wrong code");
  while(true){
    let n=prompt("New unique username:");
    if(!n) return;
    n=n.trim();
    const lname=n.toLowerCase();
    const snap = await allUsersRef.child(lname).get();
    if(snap.exists()){ alert("Username not available"); continue; }

    await userRef.child(nickname.toLowerCase()).remove();
    await allUsersRef.child(lname).set(true);
    await userRef.child(lname).set(true);
    userRef.child(lname).onDisconnect().remove();
    nickname=n;
    localStorage.setItem("nickname",nickname);
    openChat();
    return;
  }
}

/* ===== BAN / UNBAN ===== */
async function banUser(){
  const userToBan = prompt("Enter username to ban:").trim().toLowerCase();
  if(!userToBan) return;
  await db.ref("bans/" + userToBan).set(true);
  alert(userToBan + " is now banned.");
}

async function unbanUser(){
  const userToUnban = prompt("Enter username to unban:").trim().toLowerCase();
  if(!userToUnban) return;
  await db.ref("bans/" + userToUnban).remove();
  alert(userToUnban + " is now unbanned.");
}

/* ===== FORMAT TIME ===== */
function formatTime(ts){
  const d=new Date(ts);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

/* ===== OTHER SECTIONS ===== */
function openDoc(){content.innerHTML=`<h2>Document</h2><p>Write your notes here.</p>`;}
function openYT(){content.innerHTML=`<h2>YouTube</h2><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>`;}
function openGames(){content.innerHTML=`<h2>Games</h2><p>Game section coming soon.</p>`;}
function openProxy(){content.innerHTML=`<h2>Proxy</h2><iframe src="https://rammer.nana.mikechan.ca/"></iframe>`;}
function clearChat(){if(confirm("Clear all chat?")) db.ref("chat").remove();}

</script>
</body>
</html>
