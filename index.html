<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Research Notes</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

/* FAKE DOCUMENT */

.page{
width:800px;
background:white;
margin:40px auto;
padding:60px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.footer{
color:gray;
font-size:12px;
margin-top:40px;
}

/* HUB */

#hub{
display:none;
height:100vh;
}

.sidebar{
width:200px;
background:#2f2f2f;
color:white;
padding:20px;
float:left;
height:100%;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
background:#444;
color:white;
cursor:pointer;
}

.content{
margin-left:200px;
padding:20px;
height:100%;
}

/* DOCUMENT EDITOR */

#editor{
border:1px solid #ccc;
padding:20px;
min-height:300px;
}

/* YOUTUBE */

iframe{
width:800px;
height:450px;
border:none;
margin-top:20px;
}

</style>
</head>

<body>

<!-- NORMAL DOCUMENT -->

<div id="documentView" class="page">

<h1>Science Research Notes</h1>

<p>
These are draft notes for upcoming research topics and ideas.
</p>

<p>
Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
Suspendisse potenti. Pellentesque habitant morbi tristique.
</p>

<div class="footer">
Page 1 | Word Count: <span id="wordCount">1342</span>
</div>

</div>

<!-- HUB -->

<div id="hub">

<div class="sidebar">

<button onclick="showDoc()">Document</button>
<button onclick="showYT()">YouTube</button>

</div>

<div class="content" id="content">

Welcome

</div>

</div>

<script>

/* MAIN PASSWORD */

const mainCode = "4293"
let clickCount = 0

function askPassword(){

let input = prompt("Enter code")

if(input === mainCode){

document.getElementById("documentView").style.display="none"
document.getElementById("hub").style.display="block"

}
else if(input !== null){
alert("Incorrect")
}

}

/* SECRET SHORTCUT */

document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.shiftKey && e.key==="E"){
askPassword()
}
})

/* WORD COUNT SECRET */

document.getElementById("wordCount").onclick=function(){

clickCount++

if(clickCount>=5){
clickCount=0
askPassword()
}

}

/* DOCUMENT PAGE */

function showDoc(){

document.getElementById("content").innerHTML=`

<button onclick="unlockEdit()">Edit</button>

<div id="editor" contenteditable="false">

<h2>Notes</h2>

<p>
Write whatever you want here.
</p>

</div>

`

}

/* EDIT LOCK */

function unlockEdit(){

let code=prompt("Enter edit code")

if(code==="1219"){

document.getElementById("editor").contentEditable=true
alert("Editing enabled")

}
else if(code!==null){

alert("Wrong code")

}

}

/* YOUTUBE PAGE */

function showYT(){

document.getElementById("content").innerHTML=`

<h2>YouTube Embed</h2>

<input id="ytlink" placeholder="Paste YouTube link" style="width:400px;padding:8px;">
<button onclick="embedYT()">Embed</button>

<br>

<iframe id="player"></iframe>

`

}

function embedYT(){

let url=document.getElementById("ytlink").value

let id=url.split("v=")[1]

if(id){
id=id.split("&")[0]
}

document.getElementById("player").src=
"https://www.youtube.com/embed/"+id

}

</script>

</body>
</html>
