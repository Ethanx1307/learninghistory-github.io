<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Year 8 Maths Practice</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}

/* QUIZ */
#quiz{
  max-width:720px;margin:80px auto;background:white;
  padding:40px;border-radius:12px;
  box-shadow:0 20px 50px rgba(0,0,0,.15)
}
input,button{padding:10px;font-size:16px;margin-top:10px;border-radius:6px}
#feedback{font-weight:bold;margin-top:10px}

/* RESULTS */
#result,#fakeWin{display:none;text-align:center;margin-top:80px}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:999}

/* APP */
#app{display:none}
.sidebar{
  width:220px;background:#1e1e2f;padding:20px;
  position:fixed;top:0;bottom:0
}
.sidebar button{
  width:100%;margin-bottom:10px;padding:12px;
  background:#2c2f33;color:white;border:none;border-radius:8px
}
.sidebar button:hover{background:#40444b}
.content{
  margin-left:240px;padding:40px;
  background:#0f0f0f;min-height:100vh;color:white
}
#editor,#chatMessages,iframe{
  background:#1e1e2f;color:white;
  border:1px solid #40444b;
  padding:20px;border-radius:8px
}
.chat-msg{background:#2c2f33;padding:8px;margin-bottom:8px;border-radius:6px}
.time{font-size:.75em;color:#9ca3af}
.nick{color:#43b581;font-weight:bold}
#typing{font-size:.8em;color:#9ca3af;margin:6px 0}

/* Proxy */
.proxy-bar{display:flex;gap:10px;margin-bottom:10px}
.proxy-bar input{flex:1}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain:"learning-history-1bfd5.firebaseapp.com",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"learning-history-1bfd5"
});
const db=firebase.database();
  firebase.database().ref().keepSynced(true);
</script>
</head>

<body>

<!-- QUIZ -->
<div id="quiz">
  <h1>Year 8 Maths Quiz</h1>
  <p id="qText"></p>
  <input id="ans" placeholder="Type your answer">
  <br>
  <button onclick="submit()">Submit</button>
  <div id="feedback"></div>
  <p>Question <span id="num"></span>/20</p>
</div>

<div id="result">
  <h1>Your Score</h1>
  <h2 id="score"></h2>
  <button onclick="location.reload()">Retry</button>
</div>

<div id="fakeWin">
  <h1>🎉 PERFECT SCORE 🎉</h1>
  <p>You have mastered Year 8 Maths.</p>
  <div id="confetti"></div>
</div>

<!-- SECRET APP -->
<div id="app">
  <div class="sidebar">
    <button onclick="openDoc()">📄 Document</button>
    <button onclick="openChat()">💬 Chat</button>
    <button onclick="openYT()">▶️ YouTube</button>
    <button onclick="openGames()">🎮 Games</button>
    <button onclick="openProxy()">🌐 Proxy</button>
  </div>
  <div class="content" id="content">Welcome.</div>
</div>

<script>
/* ===== TIME FORMAT ===== */
function formatTime(ts){
  const d=new Date(ts),n=new Date();
  const h=d.getHours()%12||12,m=d.getMinutes().toString().padStart(2,"0");
  const ap=d.getHours()>=12?"pm":"am";
  const y=new Date(n);y.setDate(n.getDate()-1);
  if(d.toDateString()===n.toDateString())return`Today at ${h}:${m}${ap}`;
  if(d.toDateString()===y.toDateString())return`Yesterday at ${h}:${m}${ap}`;
  return`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${h}:${m}${ap}`;
}

/* ===== QUIZ ===== */
const Q=[
["7×8","56"],["45÷5","9"],["12²","144"],["√81","9"],
["15% of 200","30"],["-5+12","7"],["6²÷3","12"],
["Area 5×4","20"],["Perimeter square 6","24"],
["2x=18","9"],["9³","729"],["1/2 of 3/4","3/8"],
["10⁻¹","0.1"],["Mean of 2,4,6","4"],
["5x=25","5"],["√144","12"],["7+(-3)","4"],
["20% of 50","10"],["x+7=12","5"],["3×(4+2)","18"]
];
let qi=0,score=0;
function loadQ(){qText.innerText=Q[qi][0];num.innerText=qi+1;ans.value="";feedback.innerText=""}
loadQ();
function submit(){
  const a=ans.value.trim().toLowerCase();
  if(a==="opensesame"||a==="open sesame"){
    quiz.style.display="none";app.style.display="block";openChat();return;
  }
  if(a===Q[qi][1]){score++;feedback.innerText="Correct!"}
  else feedback.innerText="Incorrect.";
  qi++;qi<20?setTimeout(loadQ,500):finish();
}
function finish(){
  quiz.style.display="none";
  score===20?(fakeWin.style.display="block",party()):(result.style.display="block",score.innerText=`${score}/20`);
}
function party(){
  for(let i=0;i<120;i++){
    const d=document.createElement("div");
    d.style.position="absolute";
    d.style.width=d.style.height="8px";
    d.style.background=`hsl(${Math.random()*360},90%,60%)`;
    d.style.left=Math.random()*100+"%";
    d.style.top=Math.random()*100+"%";
    confetti.appendChild(d);
    setTimeout(()=>d.remove(),3000);
  }
}

/* ===== DOCUMENT ===== */
function openDoc(){
  content.innerHTML=`<h2>Document</h2><button id="unlock">Unlock Editing</button><div id="editor" contenteditable="false"></div>`;
  const ed=document.getElementById("editor");
  db.ref("doc").on("value",s=>{if(!ed.isContentEditable)ed.innerHTML=s.val()||""});
  unlock.onclick=()=>{
    if(prompt("Edit code")!=="1219")return alert("Wrong code");
    ed.contentEditable=true;unlock.disabled=true;
  };
  ed.oninput=()=>db.ref("doc").set(ed.innerHTML);
}

/* ===== CHAT + TYPING ===== */
function openChat(){
  let nick=localStorage.nick||prompt("Nickname")||"Anon";
  localStorage.nick=nick;
  content.innerHTML=`
  <h2>Chat</h2>
  <div id="typing"></div>
  <button onclick="changeNick()">Change Nickname</button>
  <button onclick="clearChat()">Clear Chat</button>
  <div id="chatMessages"></div>
  <input id="msg" placeholder="Message">
  <button onclick="send()">Send</button>`;

  const typingRef=db.ref("typing/"+nick);
  let tmo;

  msg.oninput=()=>{
    typingRef.set(true);
    clearTimeout(tmo);
    tmo=setTimeout(()=>typingRef.remove(),1200);
  };

  db.ref("typing").on("value",s=>{
    const t=s.val()||{};
    const names=Object.keys(t).filter(n=>n!==nick);
    typing.innerText=names.length?`${names.join(", ")} is typing…`:"";
  });

  db.ref("chat").off();
  db.ref("chat").on("child_added",s=>{
    const m=s.val();
    const d=document.createElement("div");
    d.className="chat-msg";
    d.innerHTML=`<div class="time">${formatTime(m.t)}</div><div class="nick">${m.n}</div>${m.m}`;
    chatMessages.appendChild(d);
    chatMessages.scrollTop=chatMessages.scrollHeight;
  });

  window.send=()=>{
    if(!msg.value)return;
    typingRef.remove();
    db.ref("chat").push({n:nick,m:msg.value,t:Date.now()});
    msg.value="";
  };
  window.changeNick=()=>{
    if(prompt("Code")!=="4293")return;
    localStorage.nick=prompt("New nickname")||nick;
  };
  window.clearChat=()=>{
    if(prompt("Code")!=="Ethandagod")return;
    db.ref("chat").remove();chatMessages.innerHTML="";
  };
}

/* ===== YT ===== */
function openYT(){
  content.innerHTML=`<input id="y"><button onclick="p.src='https://www.youtube.com/embed/'+y.value.split('v=')[1]">Embed</button><iframe id="p" style="width:100%;height:420px"></iframe>`;
}

/* ===== GAMES ===== */
function openGames(){window.open("game.html","_blank")}

/* ===== PROXY (UPDATED DEFAULT SITE) ===== */
function openProxy(){
  content.innerHTML=`
  <h2>Research Viewer</h2>
  <div class="proxy-bar">
    <input id="proxyURL" value="https://geography.callcentercuritiba.com.br/">
    <button onclick="loadProxy()">Go</button>
  </div>
  <iframe id="proxyFrame" src="https://geography.callcentercuritiba.com.br/" style="width:100%;height:500px"></iframe>`;
}
function loadProxy(){
  let u=proxyURL.value.trim();
  if(!u.startsWith("http"))u="https://"+u;
  proxyFrame.src=u;
}
</script>
</body>
</html>
