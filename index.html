<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Learning Hub</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f19;
  color:white;
}

#app { display:none; height:100vh; }

.sidebar {
  width:220px;
  background:#020617;
  color:white;
  padding:20px;
  position:fixed;
  top:0; bottom:0;
}

.sidebar button {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#1e293b;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.sidebar button:hover { background:#334155; }

.content {
  margin-left:240px;
  padding:30px;
  min-height:100vh;
  background:#0b0f19;
}

#chatMessages {
  background:#020617;
  border-radius:6px;
  padding:10px;
  height:320px;
  overflow-y:auto;
}

.msg { margin-bottom:12px; }
.msg .time { font-size:11px; color:#9ca3af; }
.msg .name { font-weight:bold; }

input {
  width:75%;
  padding:8px;
}
button { padding:8px; }

.smallBtn {
  font-size:12px;
  margin-left:5px;
}
</style>
</head>

<body>

<!-- QUIZ GATE -->
<div id="quizGate" class="content">
  <h2>Year 8 Maths Warm-Up</h2>
  <p id="qText"></p>
  <input id="ans" placeholder="Type answer">
  <button onclick="submitQuiz()">Submit</button>
  <p id="feedback"></p>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <button onclick="openChat()">💬 Chat</button>
    <button onclick="openDoc()">📄 Document</button>
    <button onclick="openYT()">▶️ YouTube</button>
    <button onclick="openGames()">🎮 Games</button>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* 🔥 FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain: "learning-history-1bfd5.firebaseapp.com",
  databaseURL: "https://learning-history-1bfd5-default-rtdb.firebaseio.com",
  projectId: "learning-history-1bfd5",
});
const db = firebase.database();

/* FIX */
const content = document.getElementById("content");

/* 👤 NICKNAME */
let nickname = localStorage.getItem("nickname");
if (!nickname) {
  nickname = prompt("Choose a nickname:") || "Anonymous";
  localStorage.setItem("nickname", nickname);
}

/* 👑 ADMIN */
const ADMIN_CODE = "Ethandagod@1";
let isAdmin = localStorage.getItem("admin") === "true";

function adminLogin(){
  const code = prompt("Admin code:");
  if(code === ADMIN_CODE){
    localStorage.setItem("admin","true");
    isAdmin = true;
    alert("Admin enabled");
  }
}

/* 🚫 MUTE */
function checkMuted(cb){
  db.ref("muted/"+nickname).once("value",s=>{
    cb(s.val() === true);
  });
}

/* ⏱ COOLDOWN */
let lastSent = 0;
const COOLDOWN = 2000;

/* 💬 CHAT */
function openChat(){
  content.innerHTML = `
    <h2>Chat</h2>
    <div id="chatMessages"></div>
    <input id="msg" placeholder="Message">
    <button onclick="sendMsg()">Send</button><br><br>
    <button class="smallBtn" onclick="changeNick()">Change Nick</button>
    <button class="smallBtn" onclick="adminLogin()">Admin</button>
    ${isAdmin ? `
      <button class="smallBtn" onclick="clearChat()">Clear</button>
      <button class="smallBtn" onclick="muteUser()">Mute</button>
      <button class="smallBtn" onclick="unmuteUser()">Unmute</button>
    ` : ``}
  `;

  const box = document.getElementById("chatMessages");
  box.innerHTML = "";

  db.ref("chat").off();
  db.ref("chat").on("child_added",snap=>{
    const m = snap.val();
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `
      <div class="time">${formatTime(m.time)}</div>
      <div><span class="name">${m.nick}</span>: ${m.msg}</div>
    `;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });

  document.getElementById("msg").addEventListener("keydown",e=>{
    if(e.key==="Enter"){
      e.preventDefault();
      sendMsg();
    }
  });
}

function sendMsg(){
  const now = Date.now();
  if(now - lastSent < COOLDOWN){
    alert("Slow down your chat ⏱");
    return;
  }

  checkMuted(muted=>{
    if(muted){ alert("You are muted"); return; }
    const i = document.getElementById("msg");
    if(!i.value.trim()) return;
    lastSent = now;
    db.ref("chat").push({
      nick:nickname,
      msg:i.value.trim(),
      time:Date.now()
    });
    i.value="";
  });
}

function formatTime(ts){
  const d=new Date(ts);
  return d.toLocaleString();
}

/* MOD */
function muteUser(){ const u=prompt("Mute who?"); if(u) db.ref("muted/"+u).set(true); }
function unmuteUser(){ const u=prompt("Unmute who?"); if(u) db.ref("muted/"+u).remove(); }
function clearChat(){ if(confirm("Clear chat?")) db.ref("chat").remove(); }
function changeNick(){
  if(prompt("Code")!=="4293") return alert("Wrong");
  const n=prompt("New nickname:");
  if(n){ localStorage.setItem("nickname",n); location.reload(); }
}

/* 📄 DOCUMENT */
function openDoc(){
  if(prompt("Access code")!=="12345678h") return alert("No access");
  content.innerHTML=`
    <h2>Document</h2>
    <button onclick="unlockEdit()">Unlock Editing</button>
    <div id="editor" contenteditable="false"></div>
  `;
  const ed=document.getElementById("editor");
  const ref=db.ref("document");
  ref.on("value",s=>{ if(s.val()) ed.innerHTML=s.val(); });
  let t;
  ed.addEventListener("input",()=>{
    clearTimeout(t);
    t=setTimeout(()=>ref.set(ed.innerHTML),1200);
  });
}
function unlockEdit(){
  if(prompt("Edit code")==="1219")
    document.getElementById("editor").contentEditable="true";
}

/* ▶️ YOUTUBE */
function openYT(){
  content.innerHTML=`
    <input id="yt" placeholder="YouTube URL">
    <button onclick="embed()">Embed</button>
    <iframe id="player" style="width:100%;height:400px;border:none"></iframe>
  `;
}
function embed(){
  const u=document.getElementById("yt").value;
  const id=u.includes("v=")?u.split("v=")[1].split("&")[0]:u.split("/").pop();
  document.getElementById("player").src="https://www.youtube.com/embed/"+id;
}

/* 🎮 GAMES */
function openGames(){ window.open("game.html","_blank"); }

/* 🎯 QUIZ */
let currentQ=0, correct=0, answer="";

function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function genQuestion(l){
  let q,a;
  if(l<10){
    let x=rand(1,20),y=rand(1,20);
    q=`${x} + ${y}`; a=(x+y)+"";
  }else if(l<25){
    let x=rand(2,12),y=rand(2,12);
    q=`${x} × ${y}`; a=(x*y)+"";
  }else if(l<40){
    let x=rand(1,9),y=rand(2,9);
    q=`${x}/${y} as decimal (2dp)`; a=(x/y).toFixed(2);
  }else{
    let x=rand(2,10),y=rand(1,10);
    q=`Solve: ${x}x = ${x*y}`; a=y+"";
  }
  answer=a;
  qText.innerText=`Question ${currentQ+1}/50: ${q}`;
}

function submitQuiz(){
  const u=ans.value.trim();
  if(u===answer){ correct++; feedback.innerText="Correct ✅"; }
  else feedback.innerText=`Wrong ❌ (ans: ${answer})`;
  ans.value="";
  currentQ++;
  if(correct>=50){
    quizGate.innerHTML=`<h2>Access Granted 🎉</h2><p>Code: <b>opensesame</b></p>`;
    setTimeout(()=>{
      quizGate.style.display="none";
      app.style.display="block";
      openChat();
    },1500);
    return;
  }
  if(currentQ>=50){
    feedback.innerText=`You got ${correct}/50. Refresh to retry.`;
    return;
  }
  genQuestion(currentQ);
}

genQuestion(0);
</script>
</body>
</html>
