<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Hub</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
#quiz{max-width:720px;margin:60px auto;background:#111;padding:40px;border-radius:12px}
#quiz input,#quiz button{padding:10px;font-size:15px;margin-top:8px;border-radius:6px}
#feedback{font-weight:bold;margin-top:10px;color:#fbb}
#app{display:none}
.sidebar{width:220px;background:#1e1e2f;padding:20px;position:fixed;top:0;bottom:0}
.sidebar button{width:100%;margin-bottom:10px;padding:12px;background:#2c2f33;color:white;border:none;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:#40444b}
.content{margin-left:240px;padding:40px;min-height:100vh}
#chatBox{max-height:360px;overflow-y:auto;background:#313338;padding:10px;border-radius:6px;margin-bottom:8px}
.msg{margin-bottom:10px}
.time{font-size:11px;color:#aaa}
.name{font-weight:bold;color:#57a4ff}
input,button{padding:8px;margin-top:5px;border-radius:5px;border:none}
input{width:70%}
button{background:#5865f2;color:white;cursor:pointer}
button:hover{opacity:0.85}
#editor{background:#1e1e2f;border-radius:8px;padding:16px;min-height:200px}
iframe{width:100%;height:300px;border-radius:8px;border:none}
.adminBox{background:#1e1e2f;padding:10px;border-radius:8px;margin-top:10px;display:flex;gap:20px}
.adminColumn{flex:1;background:#1e1e2f;padding:10px;border-radius:8px}
.banned{color:#ff6b6b;font-weight:bold}
.onlineUser{color:#4CAF50;font-weight:bold}
.offlineUser{color:#ff4d4d;font-weight:bold}
</style>
</head>
<body>

<section id="quiz">
<h1>Year 8 Maths Quiz</h1>
<p id="q"></p>
<input id="a" placeholder="Type answer here">
<button onclick="submitQ()">Submit</button>
<div id="feedback"></div>
<p>Question <span id="n"></span>/50</p>
</section>

<section id="app">
<div class="sidebar">
<button onclick="openDoc()">📄 Document</button>
<button onclick="openChat()">💬 Chat</button>
<button onclick="openYT()">▶️ YouTube</button>
<button onclick="openGames()">🎮 Games</button>
<button onclick="openProxy()">🌐 Proxy</button>
</div>
<div class="content" id="content">Welcome!</div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// RESET localStorage for testing new user prompt
localStorage.removeItem("nickname");
localStorage.removeItem("userId");

const firebaseConfig={
  apiKey:"AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain:"learning-history-1bfd5.firebaseapp.com",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"learning-history-1bfd5",
  storageBucket:"learning-history-1bfd5.appspot.com",
  messagingSenderId:"231811778288",
  appId:"1:231811778288:web:d112859a8bc6143fffa435"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
let isAdmin=false;

// ===== QUIZ =====
let questions=[["7×8","56"],["45÷5","9"],["12²","144"],["√81","9"],["15% of 200","30"],["-5+12","7"],["6²÷3","12"],["Area 5×4","20"],["Perimeter square 6","24"],["2x=18","9"]];
questions.sort(()=>Math.random()-0.5);

let i=0,score=0;
const q=document.getElementById("q"),a=document.getElementById("a"),feedback=document.getElementById("feedback"),n=document.getElementById("n");
function loadQ(){q.textContent=questions[i][0];n.textContent=i+1;a.value="";feedback.textContent="";}
loadQ();
function submitQ(){
  const v=a.value.trim();
  if(v.toLowerCase()==="ethandagod@1"){isAdmin=true;unlockApp();return;}
  if(v.toLowerCase()==="opensesame"||v.toLowerCase()==="open sesame"){unlockApp();return;}
  if(v===questions[i][1]){score++;feedback.textContent="Correct!"}else{feedback.textContent="Incorrect"}
  i++;if(i<questions.length){setTimeout(loadQ,400);}else{finishQ();}
}
function finishQ(){quiz.innerHTML=`<h1>Score</h1><h2>${score}/${questions.length}</h2><button onclick="location.reload()">Retry</button>`;}
function unlockApp(){quiz.style.display="none";app.style.display="block";openChat();}
a.addEventListener("keydown", e => { if(e.key === "Enter") submitQ(); });

// ===== CHAT + ADMIN =====
let userId=localStorage.getItem("userId");
if(!userId){userId=Date.now().toString();localStorage.setItem("userId",userId);}
let nickname=localStorage.getItem("nickname");
let changedName=false;

async function openChat(){
  if(!nickname){
    while(true){
      let n=prompt("Choose your nickname:")||"Anonymous";
      n=n.trim();
      if(!n) continue;
      const snapshot=await db.ref().once("value");
      const users=snapshot.val()?.users||{};
      const bans=snapshot.val()?.bans||{};
      let taken=false;
      for(const k in users){if(users[k].name.toLowerCase()===n.toLowerCase()){taken=true;break;}}
      for(const k in bans){if(bans[k].name.toLowerCase()===n.toLowerCase()){taken=true;break;}}
      if(taken){alert("Nickname taken or banned, choose another.");continue;}
      nickname=n;localStorage.setItem("nickname",nickname);break;
    }
  }

  db.ref("bans/"+userId).on("value",snap=>{if(snap.val()) document.body.innerHTML="<h1 class='banned'>You are banned</h1>";});

  content.innerHTML=`<h2>Chat</h2>
  <button onclick="changeName()">Change Nickname</button>
  <button onclick="clearChat()">Clear Chat</button>
  <div id="chatBox"></div>
  <input id="msgInput"><button onclick="sendMsg()">Send</button>
  ${isAdmin?'<div class="adminBox"><div class="adminColumn"><h3>Users</h3><div id="userList"></div></div><div class="adminColumn"><h3>Ban</h3><div id="banList"></div></div><div class="adminColumn"><h3>Unban</h3><div id="unbanList"></div></div></div>':""}`;

  const chatBox=document.getElementById("chatBox");
  const msgInput=document.getElementById("msgInput");

  db.ref("users/"+userId).update({name:nickname,lastSeen:Date.now()});

  msgInput.addEventListener("keydown", e=>{if(e.key==="Enter") sendMsg();});

  db.ref("chat").on("child_added",snap=>{
    const m=snap.val();
    db.ref("users/"+userId).update({name:nickname,lastSeen:Date.now()});
    const div=document.createElement("div");
    div.className="msg";
    div.innerHTML=`<div class="time">${formatTime(m.time)}</div><span class="name">${m.name}</span>: ${m.text}`;
    chatBox.appendChild(div);
    chatBox.scrollTop=chatBox.scrollHeight;
  });

  if(isAdmin){
    function renderAdmin(usersSnap,bansSnap){
      const userList=document.getElementById("userList");
      const banList=document.getElementById("banList");
      const unbanList=document.getElementById("unbanList");
      userList.innerHTML=""; banList.innerHTML=""; unbanList.innerHTML="";

      // Users column (online/offline)
      usersSnap.forEach(u=>{
        const online=(Date.now()-u.val().lastSeen)<60000;
        const span=document.createElement("span");
        span.className=online?"onlineUser":"offlineUser";
        span.textContent=u.val().name;
        userList.appendChild(span);
        userList.appendChild(document.createElement("br"));

        // Ban column button
        const btn=document.createElement("button");
        btn.textContent="Ban";
        btn.onclick=()=>{if(confirm(`Ban ${u.val().name}?`)){db.ref("bans/"+u.key).set({name:u.val().name});db.ref("users/"+u.key).remove();}};
        banList.appendChild(document.createTextNode(u.val().name+" ")); 
        banList.appendChild(btn);
        banList.appendChild(document.createElement("br"));
      });

      // Unban column
      bansSnap.forEach(b=>{
        const btn=document.createElement("button");
        btn.textContent="Unban";
        btn.onclick=()=>{if(confirm(`Unban ${b.val().name}?`)) db.ref("bans/"+b.key).remove();};
        unbanList.appendChild(document.createTextNode(b.val().name+" "));
        unbanList.appendChild(btn);
        unbanList.appendChild(document.createElement("br"));
      });
    }

    let usersData=null,bansData=null;
    db.ref("users").on("value",s=>{usersData=s;if(bansData) renderAdmin(usersData,bansData);});
    db.ref("bans").on("value",s=>{bansData=s;if(usersData) renderAdmin(usersData,bansData);});
  }

  window.sendMsg=function(){
    if(!msgInput.value.trim()) return;
    db.ref("users/"+userId).update({name:nickname,lastSeen:Date.now()});
    db.ref("chat").push({name:nickname,text:msgInput.value,time:Date.now()});
    msgInput.value="";
  }
}

// ===== BAN / UNBAN =====
function changeName(){
  if(changedName){alert("Already changed once"); return;}
  if(prompt("Enter code 4293 to change username")!=="4293") return alert("Wrong code");
  let n=prompt("Enter new nickname:"); if(!n) return;
  n=n.trim(); nickname=n; localStorage.setItem("nickname",nickname);
  db.ref("users/"+userId).update({name:nickname,lastSeen:Date.now()});
  changedName=true;
}
function clearChat(){
  if(prompt("Enter code to clear chat:")!=="Ethandagod") return alert("Wrong code");
  db.ref("chat").remove();
  openChat();
}

// ===== YT/GAMES/PROXY =====
function openYT(){content.innerHTML=`<input id="ytInput"><button onclick="loadYT()">Load</button><iframe id="ytFrame"></iframe>`;}
function loadYT(){let u=ytInput.value,id="";if(u.includes("watch?v=")) id=u.split("watch?v=")[1].split("&")[0];if(u.includes("youtu.be/")) id=u.split("youtu.be/")[1];ytFrame.src="https://www.youtube.com/embed/"+id;}
function openGames(){window.open("game.html","_blank");}
function openProxy(){window.open("https://boi.ps-wartau.ch/","_blank");}

// ===== TIME =====
function formatTime(ts){
  const d=new Date(ts),t=new Date(),y=new Date();y.setDate(t.getDate()-1);
  let h=d.getHours()%12||12,m=d.getMinutes().toString().padStart(2,"0");
  let ap=d.getHours()>=12?"PM":"AM";
  if(d.toDateString()===t.toDateString()) return `Today ${h}:${m}${ap}`;
  if(d.toDateString()===y.toDateString()) return `Yesterday ${h}:${m}${ap}`;
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${h}:${m}${ap}`;
}
</script>
</body>
</html>
