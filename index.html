<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Year 8 Maths Practice</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}
/* QUIZ */
#quiz{max-width:720px;margin:80px auto;background:white;padding:40px;border-radius:10px;box-shadow:0 15px 40px rgba(0,0,0,.15)}
input,button{padding:10px;font-size:16px;margin-top:10px}
#feedback{font-weight:bold;margin-top:10px;text-align:center}
/* RESULT */
#result,#fakeWin{display:none;text-align:center;margin-top:50px}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
/* APP */
#app{display:none}
.sidebar{width:220px;background:#1e1e2f;padding:20px;position:fixed;top:0;bottom:0}
.sidebar button{width:100%;margin-bottom:10px;padding:10px;background:#2c2f33;color:white;border:none;border-radius:6px;cursor:pointer}
.sidebar button:hover{background:#40444b}
.content{margin-left:240px;padding:40px;background:#0f0f0f;min-height:100vh;color:white}
#editor,#chatMessages{background:#1e1e2f;color:white;border:1px solid #40444b;padding:20px;min-height:300px;overflow-y:auto;border-radius:6px}
.chat-msg{background:#2c2f33;padding:6px;margin-bottom:8px;border-radius:6px}
.time{font-size:.7em;color:#72767d}
.nick{color:#43b581;font-weight:bold}
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain: "learning-history-1bfd5.firebaseapp.com",
  databaseURL: "https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "learning-history-1bfd5"
});
const db=firebase.database();
</script>
</head>
<body>

<!-- QUIZ -->
<div id="quiz">
  <h1>Year 8 Maths Quiz</h1>
  <p id="qText"></p>
  <input id="ans" placeholder="Type your answer">
  <br>
  <button onclick="submit()">Submit</button>
  <div id="feedback"></div>
  <p>Question <span id="num"></span>/20</p>
</div>

<!-- RESULT -->
<div id="result">
  <h1>Your Score</h1>
  <h2 id="score"></h2>
  <button onclick="retry()">Retry</button>
</div>

<!-- FAKE WIN -->
<div id="fakeWin">
  <h1>🎉 PERFECT SCORE 🎉</h1>
  <p>You have mastered Year 8 Maths.</p>
  <div id="confetti"></div>
  <p>(Nothing else happens.)</p>
</div>

<!-- SECRET APP -->
<div id="app">
  <div class="sidebar">
    <button onclick="openDoc()">📄 Document</button>
    <button onclick="openChat()">💬 Chat</button>
    <button onclick="openYT()">▶️ YouTube</button>
    <button onclick="openGames()">🎮 Games</button>
  </div>
  <div class="content" id="content">Welcome.</div>
</div>

<script>
/* QUIZ DATA */
const Q=[
 ["7×8","56"],["45÷5","9"],["12²","144"],["√81","9"],
 ["15% of 200","30"],["-5+12","7"],["6²÷3","12"],
 ["Area 5×4","20"],["Perimeter square 6","24"],
 ["2x=18","9"],["9³","729"],["1/2 of 3/4","3/8"],
 ["10⁻¹","0.1"],["Mean of 2,4,6","4"],
 ["5x=25","5"],["√144","12"],["7+(-3)","4"],
 ["20% of 50","10"],["x+7=12","5"],["3×(4+2)","18"]
];
let i=0,score=0;

function loadQ(){
  qText.innerText=Q[i][0];
  num.innerText=i+1;
  feedback.innerText="";
  ans.value="";
}
loadQ();

function submit(){
  const a=ans.value.trim().toLowerCase();
  // SECRET
  if(a==="opensesame"||a==="open sesame"){
    quiz.style.display="none";app.style.display="block";openChat();return;
  }
  if(a===Q[i][1]){feedback.innerText="Correct!";score++}
  else feedback.innerText="Incorrect.";
  i++;
  if(i<20) setTimeout(loadQ,600);
  else finish();
}

function finish(){
  quiz.style.display="none";
  if(score===20){
    fakeWin.style.display="block";
    confettiEffect();
  } else {
    result.style.display="block";
    score.innerText=`${score} / 20`;
  }
}
function retry(){score=0;i=0;result.style.display="none";fakeWin.style.display="none";quiz.style.display="block";loadQ();}

/* CONFETTI */
function confettiEffect(){
  const confetti=document.getElementById("confetti");
  for(let i=0;i<150;i++){
    const d=document.createElement("div");
    d.style.position="absolute";
    d.style.width="10px";d.style.height="10px";
    d.style.background=['#f44336','#e91e63','#9c27b0','#2196f3','#4caf50','#ffeb3b'][Math.floor(Math.random()*6)];
    d.style.left=Math.random()*window.innerWidth+"px";
    d.style.top=Math.random()*window.innerHeight+"px";
    d.style.opacity=Math.random();
    d.style.transform=`rotate(${Math.random()*360}deg)`;
    confetti.appendChild(d);
    setTimeout(()=>d.remove(),3000);
  }
}

/* DOCUMENT */
function openDoc(){
  content.innerHTML=`<h2>Document</h2><div id="editor" contenteditable></div>`;
  const ref=db.ref("doc");
  ref.on("value",s=>editor.innerHTML=s.val()||"");
  editor.oninput=()=>ref.set(editor.innerHTML);
}

/* CHAT */
function openChat(){
  let nick=localStorage.nick||prompt("Nickname")||"Anon";
  localStorage.nick=nick;
  content.innerHTML=`
  <h2>Chat</h2>
  <button onclick="changeNick()">Change Nickname</button>
  <button onclick="clearChat()">Clear Chat</button>
  <div id="chatMessages"></div>
  <input id="msg"><button onclick="send()">Send</button>`;
  let last=0;
  db.ref("chat").off(); // prevent duplicates
  db.ref("chat").on("child_added",s=>{
    const m=s.val();
    const d=document.createElement("div");
    d.className="chat-msg";

    const dt=new Date(m.t); const now=new Date(); let timeStr="";
    const h=dt.getHours()%12||12;
    const min=dt.getMinutes().toString().padStart(2,"0");
    const ampm=dt.getHours()>=12?"pm":"am";
    const yesterday=new Date(now); yesterday.setDate(now.getDate()-1);
    if(dt.toDateString()===now.toDateString()) timeStr=`Today at ${h}:${min}${ampm}`;
    else if(dt.toDateString()===yesterday.toDateString()) timeStr=`Yesterday at ${h}:${min}${ampm}`;
    else timeStr=`${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()} ${h}:${min}${ampm}`;

    d.innerHTML=`<div class="time">${timeStr}</div><div class="nick">${m.n}</div>${m.m}`;
    chatMessages.appendChild(d);
    chatMessages.scrollTop=chatMessages.scrollHeight;
  });

  window.send=()=>{
    if(Date.now()-last<1000) return alert("Slow down!");
    if(msg.value){db.ref("chat").push({n:nick,m:msg.value,t:Date.now()});msg.value="";last=Date.now();}
  };
  window.changeNick=()=>{
    if(prompt("Code")!=="4293") return;
    nick=prompt("New nickname")||nick;
    localStorage.nick=nick;
  };
  window.clearChat=()=>{
    if(prompt("Code")!=="Ethandagod") return;
    db.ref("chat").remove();chatMessages.innerHTML="";
  };
}

/* YT */
function openYT(){content.innerHTML=`<input id="y"><button onclick="e()">Embed</button>
<iframe id="p" style="width:100%;height:400px"></iframe>`;
window.e=()=>p.src="https://www.youtube.com/embed/"+y.value.split("v=")[1];}

/* GAMES */
function openGames(){window.open("game.html","_blank");}
</script>
</body>
</html>
