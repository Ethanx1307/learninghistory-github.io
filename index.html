<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Hub</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;overflow-x:hidden}
#quiz{max-width:720px;margin:60px auto;background:#111;padding:40px;border-radius:12px;text-align:center}
#quiz input,#quiz button{padding:10px;font-size:15px;margin-top:8px;border-radius:6px}
#feedback{font-weight:bold;margin-top:10px;color:#fbb}
#app{display:none}
.sidebar{width:220px;background:#1e1e2f;padding:20px;position:fixed;top:0;bottom:0}
.sidebar button{width:100%;margin-bottom:10px;padding:12px;background:#2c2f33;color:white;border:none;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:#40444b}
.content{margin-left:240px;padding:40px;min-height:100vh;background:#0f0f0f}
#chatBox{max-height:360px;overflow-y:auto;background:#313338;padding:10px;border-radius:6px;margin-bottom:8px}
.msg{margin-bottom:10px}
.time{font-size:11px;color:#aaa}
.name{font-weight:bold;color:#57a4ff}
input,button{padding:8px;margin-top:5px;border-radius:5px;border:none}
input{width:70%}
button{background:#5865f2;color:white;cursor:pointer}
button:hover{opacity:0.85}
#editor{background:#1e1e2f;border-radius:8px;padding:16px;min-height:200px}
iframe{width:100%;height:300px;border-radius:8px;border:none}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;z-index:999}
#bigText{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:bold;display:none;z-index:1000;text-align:center}
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div id="bigText">GOOD JOB!<br>YOU DID ALL THAT FOR NOTHING!</div>

<!-- QUIZ -->
<section id="quiz">
<h1>Maths Challenge</h1>
<p id="q"></p>
<input id="a" placeholder="Type answer here">
<br>
<button onclick="submitQ()">Submit</button>
<div id="feedback"></div>
<p>Question <span id="n"></span>/75</p>
</section>

<!-- APP -->
<section id="app">
<div class="sidebar">
<button onclick="openDoc()">📄 Document</button>
<button onclick="openChat()">💬 Chat</button>
<button onclick="openYT()">▶️ YouTube</button>
<button onclick="openGames()">🎮 Games</button>
<button onclick="openProxy()">🌐 Proxy</button>
</div>
<div class="content" id="content">Welcome!</div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain:"learning-history-1bfd5.firebaseapp.com",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"learning-history-1bfd5",
  storageBucket:"learning-history-1bfd5.appspot.com",
  messagingSenderId:"231811778288",
  appId:"1:231811778288:web:d112859a8bc6143fffa435"
});
const db=firebase.database();

/* ===== QUIZ ===== */
const questions=[["2+2","4"],["5+7","12"],["9-4","5"],["6×3","18"],["20÷4","5"],
["12+15","27"],["7×8","56"],["45÷5","9"],["3²","9"],["√81","9"],
["5x=20","4"],["x+7=15","8"],["2x+5=17","6"],["x²=49","7"],
["15% of 200","30"],["-5+12","7"],["-3×6","-18"],
["Derivative of x²","2x"],["Integral of 2x","x²"],
["Limit x→∞ of 1/x","0"],["Solve: x²=2","√2"],
["What is my favourite colour?","green"]];

while(questions.length<75) questions.splice(questions.length-1,0,questions[questions.length-1]);

let i=0,score=0;
const q=document.getElementById("q"),a=document.getElementById("a"),
feedback=document.getElementById("feedback"),n=document.getElementById("n");

function loadQ(){
  q.textContent=questions[i][0];
  n.textContent=i+1;
  a.value="";
  feedback.textContent="";
}
loadQ();

/* 🔑 ONLY CHANGE IS HERE */
function submitQ(){
  let v=a.value.trim().toLowerCase().replace(/\s+/g," ");

  if(v==="opensesame"||v==="open sesame"){
    unlockApp();
    return;
  }

  let ans=questions[i][1].toLowerCase();
  if(v===ans){score++;feedback.textContent="Correct!"}
  else{feedback.textContent="Incorrect"}

  i++;
  if(i<75) setTimeout(loadQ,400);
  else finishQ();
}

function finishQ(){
  quiz.innerHTML=`<h1>Score</h1><h2>${score}/75</h2>`;
  if(score===75) party();
}

function unlockApp(){
  quiz.style.display="none";
  app.style.display="block";
  openChat();
}

/* ===== CONFETTI ===== */
function party(){
  const c=document.getElementById("confetti"),ctx=c.getContext("2d");
  c.width=innerWidth;c.height=innerHeight;c.style.display="block";
  document.getElementById("bigText").style.display="block";
  let p=[...Array(200)].map(()=>({x:Math.random()*c.width,y:Math.random()*-c.height,s:Math.random()*3+2}));
  (function d(){ctx.clearRect(0,0,c.width,c.height);
    p.forEach(o=>{ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;ctx.fillRect(o.x,o.y,6,6);o.y+=o.s;if(o.y>c.height)o.y=0});
    requestAnimationFrame(d);
  })();
}

/* ===== DOCUMENTS ===== */
function openDoc(){
  content.innerHTML=`<h2>Document</h2><button id="premiumBtn">Unlock Premium</button><div id="editor"></div>`;
  const ed=document.getElementById("editor");ed.contentEditable=true;
  let typing=false;
  db.ref("doc").off();
  db.ref("doc").on("value",s=>{if(!typing)ed.innerHTML=s.val()||""});
  ed.oninput=()=>{typing=true;db.ref("doc").set(ed.innerHTML);setTimeout(()=>typing=false,200)};
  premiumBtn.onclick=()=>{
    if(prompt("Enter premium code")!=="12345678h")return alert("Wrong");
    content.innerHTML=`<h2>Premium Document</h2><button id="editBtn">Edit</button><div id="editor"></div>`;
    const ped=document.getElementById("editor");ped.contentEditable=false;
    let ptyping=false;
    db.ref("premiumDoc").off();
    db.ref("premiumDoc").on("value",s=>{if(!ptyping)ped.innerHTML=s.val()||""});
    ped.oninput=()=>{if(ped.isContentEditable){ptyping=true;db.ref("premiumDoc").set(ped.innerHTML);setTimeout(()=>ptyping=false,200)}};
    editBtn.onclick=()=>{if(prompt("Enter edit code")!=="1219")return alert("Wrong");ped.contentEditable=true};
  };
}

/* ===== OTHER FEATURES (UNCHANGED) ===== */
let nickname=localStorage.getItem("nickname");
function openChat(){
  if(!nickname){nickname=prompt("Choose nickname")||"Anonymous";localStorage.setItem("nickname",nickname)}
  content.innerHTML=`<h2>Chat</h2><button onclick="changeName()">Change Nickname</button>
  <button onclick="clearChat()">Clear Chat</button><div id="chatBox"></div>
  <input id="msgInput"><button onclick="sendMsg()">Send</button>`;
  db.ref("chat").on("child_added",s=>{
    const m=s.val();
    chatBox.innerHTML+=`<div class="msg"><div class="time">${new Date(m.time).toLocaleString()}</div><span class="name">${m.name}</span>: ${m.text}</div>`;
  });
}
function sendMsg(){if(msgInput.value.trim())db.ref("chat").push({name:nickname,text:msgInput.value,time:Date.now()});msgInput.value="";}
function changeName(){const n=prompt("New nickname");if(n){nickname=n;localStorage.setItem("nickname",n)}}
function clearChat(){if(prompt("Code")!=="Ethandagod")return;db.ref("chat").remove();openChat()}
function openYT(){content.innerHTML=`<input id="ytInput"><button onclick="loadYT()">Load</button><iframe id="ytFrame"></iframe>`}
function loadYT(){let u=ytInput.value,id=u.includes("watch?v=")?u.split("watch?v=")[1]:u.split("/").pop();ytFrame.src="https://www.youtube.com/embed/"+id}
function openGames(){window.open("game.html","_blank")}
function openProxy(){window.open("https://boi.ps-wartau.ch/","_blank")}
</script>
</body>
</html>
