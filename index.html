<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Learning Hub</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#0b0f19; color:white; }
#app { display:none; height:100vh; }
.sidebar { width:220px; background:#020617; color:white; padding:20px; position:fixed; top:0; bottom:0; }
.sidebar button { width:100%; margin-bottom:10px; padding:10px; background:#1e293b; color:white; border:none; border-radius:6px; cursor:pointer; }
.sidebar button:hover { background:#334155; }
.content { margin-left:240px; padding:30px; min-height:100vh; background:#0b0f19; }
#chatMessages { background:#020617; border-radius:6px; padding:10px; height:320px; overflow-y:auto; }
.msg { margin-bottom:12px; }
.msg .time { font-size:11px; color:#9ca3af; }
.msg .name { font-weight:bold; }
input { width:75%; padding:8px; }
button { padding:8px; }
.smallBtn { font-size:12px; margin-left:5px; }
/* Confetti effect */
.confetti { position:fixed; width:10px; height:10px; top:0; animation:fall 2s linear forwards; z-index:9999; }
@keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity:0; } }
</style>
</head>
<body>

<!-- QUIZ GATE -->
<div id="quizGate" class="content">
  <h2>Year 8 Maths Warm-Up</h2>
  <p id="qText"></p>
  <input id="ans" placeholder="Type answer">
  <button onclick="submitQuiz()">Submit</button>
  <p id="feedback"></p>
  <div id="retryArea"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <button onclick="openChat()">💬 Chat</button>
    <button onclick="openDoc()">📄 Document</button>
    <button onclick="openYT()">▶️ YouTube</button>
    <button onclick="openGames()">🎮 Games</button>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* 🔥 FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain: "learning-history-1bfd5.firebaseapp.com",
  databaseURL: "https://learning-history-1bfd5-default-rtdb.firebaseio.com",
  projectId: "learning-history-1bfd5",
});
const db = firebase.database();
const content = document.getElementById("content");

/* NICKNAME */
let nickname = localStorage.getItem("nickname");

/* CHAT COOLDOWN */
let lastSent = 0;
const COOLDOWN = 2000;

function openChat(){
  // Ask for nickname if not set
  if(!nickname){
    nickname = prompt("Choose a nickname:") || "Anonymous";
    localStorage.setItem("nickname", nickname);
  }

  content.innerHTML = `
    <h2>Chat</h2>
    <div id="chatMessages"></div>
    <input id="msg" placeholder="Message">
    <button onclick="sendMsg()">Send</button><br><br>
    <button class="smallBtn" onclick="changeNick()">Change Nickname</button>
    <button class="smallBtn" onclick="clearChat()">Clear Chat</button>
  `;

  const box = document.getElementById("chatMessages");
  box.innerHTML = "";

  // Listen for chat messages
  db.ref("chat").off();
  db.ref("chat").on("child_added", snap => {
    const m = snap.val();
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<div class="time">${formatTime(m.time)}</div><div><span class="name">${m.nick}</span>: ${m.msg}</div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });

  // Enter key sends message
  document.getElementById("msg").addEventListener("keydown", e=>{
    if(e.key==="Enter"){ e.preventDefault(); sendMsg(); }
  });
}

function sendMsg(){
  const now = Date.now();
  if(now - lastSent < COOLDOWN){ alert("Slow down your chat ⏱"); return; }

  const input = document.getElementById("msg");
  if(!input.value.trim()) return;

  lastSent = now;
  db.ref("chat").push({
    nick: nickname,
    msg: input.value.trim(),
    time: Date.now()
  });
  input.value = "";
}

function formatTime(ts){
  return new Date(ts).toLocaleString();
}

function changeNick(){
  if(prompt("Code")!=="4293") return alert("Wrong code");
  const n = prompt("New nickname:");
  if(n){
    nickname = n;
    localStorage.setItem("nickname", nickname);
    openChat();
  }
}

function clearChat(){
  if(prompt("Code")!=="Ethandagod@1") return alert("Wrong code");
  if(confirm("Clear chat?")) db.ref("chat").remove();
}

/* 📄 DOCUMENT */
function openDoc(){
  const code = prompt("Access code")||"";
  if(code.toLowerCase()==="opensesame" || code.toLowerCase()==="open sesame" || code==="12345678h"){
    content.innerHTML=`
      <h2>Document</h2>
      <button onclick="unlockEdit()">Unlock Editing</button>
      <div id="editor" contenteditable="false"></div>
    `;
    const ed = document.getElementById("editor");
    const ref = db.ref("document");
    ref.on("value", s => { if(s.val()) ed.innerHTML = s.val(); });
    let t;
    ed.addEventListener("input", ()=>{
      clearTimeout(t);
      t=setTimeout(()=>ref.set(ed.innerHTML),1200);
    });
  } else alert("No access");
}
function unlockEdit(){ if(prompt("Edit code")==="1219") document.getElementById("editor").contentEditable="true"; }

/* ▶️ YOUTUBE */
function openYT(){
  content.innerHTML = `<input id="yt" placeholder="YouTube URL"><button onclick="embed()">Embed</button><iframe id="player" style="width:100%;height:400px;border:none"></iframe>`;
}
function embed(){
  const u = document.getElementById("yt").value;
  const id = u.includes("v=")? u.split("v=")[1].split("&")[0]: u.split("/").pop();
  document.getElementById("player").src = "https://www.youtube.com/embed/" + id;
}

/* 🎮 GAMES */
function openGames(){ window.open("game.html","_blank"); }

/* 🎯 MATH QUIZ */
let currentQ = 0, correct = 0, answer = "";
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function genQuestion(l){
  let q,a;
  if(l<10){ let x=rand(1,20),y=rand(1,20); q=`${x} + ${y}`; a=(x+y)+""; }
  else if(l<25){ let x=rand(2,12),y=rand(2,12); q=`${x} × ${y}`; a=(x*y)+""; }
  else if(l<40){ let x=rand(1,9),y=rand(2,9); q=`${x}/${y} as decimal (2dp)`; a=(x/y).toFixed(2); }
  else{ let x=rand(2,10),y=rand(1,10); q=`Solve: ${x}x = ${x*y}`; a=y+""; }
  answer = a;
  qText.innerText = `Question ${currentQ+1}/50: ${q}`;
}

function submitQuiz(){
  const u = ans.value.trim().toLowerCase();
  if(u==="opensesame" || u==="open sesame"){ unlockApp(); return; }

  if(u===answer){ correct++; feedback.innerText="Correct ✅"; } 
  else feedback.innerText=`Wrong ❌ (ans: ${answer})`;
  ans.value = "";
  currentQ++;

  if(correct>=50){ finishQuiz(true); return; }
  if(currentQ>=50){ finishQuiz(false); return; }

  genQuestion(currentQ);
}

function finishQuiz(perfect){
  if(perfect){
    feedback.innerText="🎉 Perfect 50/50! Here's your code: opensesame";
    launchConfetti(50);
    setTimeout(unlockApp,1500);
  } else {
    retryArea.innerHTML=`<p>You got ${correct}/50.</p><button onclick="retryQuiz()">Retry</button>`;
  }
}

function retryQuiz(){ currentQ=0; correct=0; retryArea.innerHTML=""; genQuestion(0); }

function unlockApp(){ quizGate.style.display="none"; app.style.display="block"; openChat(); }

/* Confetti effect */
function launchConfetti(n){
  for(let i=0;i<n;i++){
    const c=document.createElement("div");
    c.className="confetti"; c.style.left=rand(0,window.innerWidth)+"px";
    c.style.background=`hsl(${rand(0,360)},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2000);
  }
}

// Start quiz
genQuestion(0);
</script>
</body>
</html>
