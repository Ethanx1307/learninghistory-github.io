<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Research Notes</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  margin:0;
}

.page{
  width:800px;
  background:white;
  margin:40px auto;
  padding:60px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
  font-size:28px;
}

.footer{
  margin-top:40px;
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<div class="page">
<h1>Science Research Notes</h1>

<p>
This document contains research notes and draft material.
</p>

<p>
Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
Vestibulum accumsan nisl sit amet justo vulputate, nec 
convallis elit bibendum.
</p>

<div class="footer">
Page 1 of 3 | Word Count: <span id="wordCount">1284</span>
</div>
</div>

<script>

const password = "1234"; 
let clickCount = 0;

function askPassword(){
  let input = prompt("Enter password:");

  if(input === password){
    window.location.href = "success.html";
  } else if(input !== null){
    alert("Wrong password");
  }
}

document.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.shiftKey && e.key === "E"){
    askPassword();
  }
});

document.getElementById("wordCount").addEventListener("click", function(){
  clickCount++;
  if(clickCount >= 5){
    clickCount = 0;
    askPassword();
  }
});

</script>

</body>
</html>
