<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Math</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
#quiz{max-width:720px;margin:60px auto;background:#111;padding:40px;border-radius:12px}
#quiz input,#quiz button{padding:10px;font-size:15px;margin-top:8px;border-radius:6px}
#feedback{font-weight:bold;margin-top:10px;color:#fbb}
#app{display:none}
.sidebar{width:220px;background:#1e1e2f;padding:20px;position:fixed;top:0;bottom:0}
.sidebar button{width:100%;margin-bottom:10px;padding:12px;background:#2c2f33;color:white;border:none;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:#40444b}
.content{margin-left:240px;padding:40px;min-height:100vh}
#chatBox{max-height:360px;overflow-y:auto;background:#313338;padding:10px;border-radius:6px;margin-bottom:8px}
.msg{margin-bottom:10px}
.time{font-size:11px;color:#aaa}
.name{font-weight:bold;color:#57a4ff}
input,button{padding:8px;margin-top:5px;border-radius:5px;border:none}
input{width:70%}
button{background:#5865f2;color:white;cursor:pointer}
button:hover{opacity:0.85}
#editor{background:#1e1e2f;border-radius:8px;padding:16px;min-height:400px;width:90%}
iframe{width:100%;height:300px;border-radius:8px;border:none}
.adminBox{background:#1e1e2f;padding:10px;border-radius:8px;margin-top:10px;display:flex;gap:20px;flex-wrap:wrap}
.adminColumn{flex:1;background:#1e1e2f;padding:10px;border-radius:8px;min-width:200px}
.banned{color:#ff6b6b;font-weight:bold}
.onlineUser{color:#4CAF50;font-weight:bold}
.offlineUser{color:#ff4d4d;font-weight:bold}
</style>
</head>
<body>

<section id="quiz">
<h1>Year 8 Maths Quiz</h1>
<p id="q"></p>
<input id="a" placeholder="Type answer here">
<button onclick="submitQ()">Submit</button>
<div id="feedback"></div>
<p>Question <span id="n"></span>/50</p>
</section>

<section id="app">
<div class="sidebar">
<button onclick="openDoc()">📄 Document</button>
<button onclick="openChat()">💬 Chat</button>
<button onclick="openYT()">▶️ YouTube</button>
<button onclick="openGames()">🎮 Games</button>
<button onclick="openProxy()">🌐 Proxy</button>
</div>
<div class="content" id="content">Welcome!</div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// ---------- PING ----------
const pingSound=new Audio("https://actions.google.com/sounds/v1/notifications/pop.mp3");
pingSound.preload="auto";

// ---------- FIREBASE ----------
const firebaseConfig={
  apiKey:"AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain:"learning-history-1bfd5.firebaseapp.com",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"learning-history-1bfd5",
  storageBucket:"learning-history-1bfd5.appspot.com",
  messagingSenderId:"231811778288",
  appId:"1:231811778288:web:d112859a8bc6143fffa435"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const storage=firebase.storage();
let isAdmin=false;

// ---------- QUIZ ----------
let questions=[["7×8","56"],["45÷5","9"],["12²","144"],["√81","9"],["15% of 200","30"],["-5+12","7"]];
questions.sort(()=>Math.random()-0.5);
let i=0;
function loadQ(){q.textContent=questions[i][0];n.textContent=i+1;a.value="";feedback.textContent="";}
loadQ();
function submitQ(){
  const v=a.value.trim();
  if(v==="ethandagod@1"){isAdmin=true;unlockApp();return;}
  if(v==="opensesame"){unlockApp();return;}
  feedback.textContent=v===questions[i][1]?"Correct!":"Incorrect";
  i++;if(i<questions.length)setTimeout(loadQ,400);
}
function unlockApp(){quiz.style.display="none";app.style.display="block";openChat();}

// ---------- CHAT ----------
let userId=localStorage.getItem("userId");
if(!userId){userId=Date.now().toString();localStorage.setItem("userId",userId);}
let nickname=localStorage.getItem("nickname");
if(!nickname){nickname=prompt("Choose your nickname:")||"Anonymous";localStorage.setItem("nickname",nickname);}

function openChat(){
content.innerHTML=`
<h2>Chat</h2>
<button onclick="changeName()">Change Nickname</button>
<button onclick="clearChat()">Clear Chat</button>
<div id="chatBox"></div>
<input id="msgInput"><button onclick="sendMsg()">Send</button>
`;
const chatBox=document.getElementById("chatBox");
db.ref("users/"+userId).set({name:nickname,lastSeen:Date.now()});
db.ref("chat").on("child_added",snap=>{
  const m=snap.val();
  const div=document.createElement("div");
  div.className="msg";
  div.innerHTML=`<div class="time">${formatTime(m.time)}</div><span class="name">${m.name}</span>: ${m.text||""}`;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
  if(m.name!==nickname){pingSound.currentTime=0;pingSound.play().catch(()=>{});}
});
}

function sendMsg(){
const input=document.getElementById("msgInput");
if(!input.value.trim())return;
db.ref("users/"+userId).update({lastSeen:Date.now()});
db.ref("chat").push({name:nickname,text:input.value,time:Date.now()});
input.value="";
}

function changeName(){
if(prompt("Enter code 4293")!=="4293")return;
nickname=prompt("New nickname")||nickname;
localStorage.setItem("nickname",nickname);
db.ref("users/"+userId).update({name:nickname});
}

function clearChat(){
if(prompt("Enter code to clear chat")!=="Ethandagod")return;
db.ref("chat").remove();
openChat();
}

// ---------- DOC ----------
let currentDoc="doc";
function openDoc(){
content.innerHTML=`
<h2>Document</h2>
<button onclick="loadDoc('doc')">Edit</button>
<button onclick="loadDoc('premiumDoc')">Premium</button>
<button onclick="editDoc()">Edit current</button>
<div id="editor" contenteditable="false"></div>`;
loadDoc("doc");
}
function loadDoc(t){
currentDoc=t;
db.ref(t).once("value",s=>{
document.getElementById("editor").innerHTML=s.val()||"";
document.getElementById("editor").contentEditable=false;
});
}
function editDoc(){
if(prompt("Enter edit code")!=="1234")return;
const e=document.getElementById("editor");
e.contentEditable=true;
e.oninput=()=>db.ref(currentDoc).set(e.innerHTML);
}

// ---------- YT / GAMES / PROXY ----------
function openYT(){content.innerHTML=`<input id="yt"><button onclick="loadYT()">Load</button><iframe id="f"></iframe>`;}
function loadYT(){f.src="https://www.youtube.com/embed/"+yt.value.split("v=")[1];}
function openGames(){window.open("game.html","_blank");}
function openProxy(){window.open("https://boi.ps-wartau.ch/","_blank");}

// ---------- TIME ----------
function formatTime(ts){
const d=new Date(ts),h=d.getHours()%12||12,m=d.getMinutes().toString().padStart(2,"0");
return h+":"+m+(d.getHours()>=12?"PM":"AM");
}
</script>
</body>
</html>
