<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Hub</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
#quiz{max-width:720px;margin:60px auto;background:#111;padding:40px;border-radius:12px}
#quiz input,#quiz button{padding:10px;font-size:15px;margin-top:8px;border-radius:6px}
#feedback{font-weight:bold;margin-top:10px;color:#fbb}
#app{display:none}
.sidebar{width:220px;background:#1e1e2f;padding:20px;position:fixed;top:0;bottom:0}
.sidebar button{width:100%;margin-bottom:10px;padding:12px;background:#2c2f33;color:white;border:none;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:#40444b}
.content{margin-left:240px;padding:40px;min-height:100vh}
#chatBox{max-height:360px;overflow-y:auto;background:#313338;padding:10px;border-radius:6px;margin-bottom:8px}
.msg{margin-bottom:10px}
.time{font-size:11px;color:#aaa}
.name{font-weight:bold;color:#57a4ff}
input,button{padding:8px;margin-top:5px;border-radius:5px;border:none}
input{width:70%}
button{background:#5865f2;color:white;cursor:pointer}
button:hover{opacity:0.85}
#editor{background:#1e1e2f;border-radius:8px;padding:16px;min-height:200px}
iframe{width:100%;height:300px;border-radius:8px;border:none}
.adminBox{background:#1e1e2f;padding:10px;border-radius:8px;margin-top:10px}
.adminBox button{margin-left:6px}
.banned{color:#ff6b6b;font-weight:bold}
</style>
</head>
<body>

<section id="quiz">
<h1>Year 8 Maths Quiz</h1>
<p id="q"></p>
<input id="a" placeholder="Type answer here">
<button onclick="submitQ()">Submit</button>
<div id="feedback"></div>
<p>Question <span id="n"></span>/50</p>
</section>

<section id="app">
<div class="sidebar">
<button onclick="openDoc()">📄 Document</button>
<button onclick="openChat()">💬 Chat</button>
<button onclick="openYT()">▶️ YouTube</button>
<button onclick="openGames()">🎮 Games</button>
<button onclick="openProxy()">🌐 Proxy</button>
</div>
<div class="content" id="content">Welcome!</div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={
  apiKey:"AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain:"learning-history-1bfd5.firebaseapp.com",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"learning-history-1bfd5",
  storageBucket:"learning-history-1bfd5.appspot.com",
  messagingSenderId:"231811778288",
  appId:"1:231811778288:web:d112859a8bc6143fffa435"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let isAdmin=false;

// ===== QUIZ =====
let questions=[["7×8","56"],["45÷5","9"],["12²","144"]];
questions.sort(()=>Math.random()-0.5);
let i=0,score=0;
const q=document.getElementById("q"),a=document.getElementById("a"),feedback=document.getElementById("feedback"),n=document.getElementById("n");
function loadQ(){q.textContent=questions[i][0];n.textContent=i+1;a.value="";feedback.textContent="";}
loadQ();

function submitQ(){
  const v=a.value.trim().toLowerCase();

  if(v==="etx12345678h"){
    isAdmin=true;
    unlockApp();
    return;
  }

  if(v==="opensesame"||v==="open sesame"){
    unlockApp();
    return;
  }

  i++;
  if(i<questions.length) loadQ();
}

function unlockApp(){
  quiz.style.display="none";
  app.style.display="block";
  openChat();
}

// ===== DOCUMENT =====
function openDoc(){
  content.innerHTML=`<h2>Document</h2><button id="editBtn">Edit</button><div id="editor"></div>`;
  const ed=document.getElementById("editor");
  ed.contentEditable=false;
  db.ref("doc").on("value",s=>{ if(document.activeElement!==ed) ed.innerHTML=s.val()||""; });
  editBtn.onclick=()=>{
    if(prompt("Enter edit code")!=="1219") return alert("Wrong code");
    ed.contentEditable=true;
    ed.oninput=()=>db.ref("doc").set(ed.innerHTML);
  };
}

// ===== CHAT + ADMIN BAN + CLEAR + NICKNAME + UNIQUE NAMES =====
let nickname="";
let banned=false;

function openChat(){
  (async()=>{
    while(true){
      let n=prompt("Choose your nickname:")||"Anonymous";
      const snapshot=await db.ref("users/"+n).get();
      if(snapshot.exists()) { alert("Name already taken. Pick another."); continue; }
      nickname=n;
      localStorage.setItem("nickname",nickname);
      break;
    }

    const userRef=db.ref("users/"+nickname);
    userRef.set(true);
    userRef.onDisconnect().remove();

    db.ref("bans/"+nickname).on("value",s=>{
      banned=!!s.val();
      if(banned){
        document.getElementById("msgInput")?.setAttribute("disabled",true);
        document.getElementById("banMsg")?.style.display="block";
      }
    });

    content.innerHTML=`
      <h2>Chat</h2>
      <button onclick="changeName()">Change Nickname</button>
      <button onclick="clearChat()">Clear Chat</button>
      <div id="banMsg" class="banned" style="display:none">You are banned from chatting.</div>
      <div id="chatBox"></div>
      <input id="msgInput" placeholder="Message">
      <button onclick="sendMsg()">Send</button>
      ${isAdmin?`<div class="adminBox"><h3>Admin Panel</h3><div id="userList"></div></div>`:""}
    `;

    const chatBox=document.getElementById("chatBox");

    db.ref("chat").limitToLast(100).on("child_added",snap=>{
      const m=snap.val();
      const d=document.createElement("div");
      d.className="msg";
      d.innerHTML=`<span class="name">${m.name}</span> <span class="time">${formatTime(m.time)}</span>: ${m.text}`;
      chatBox.appendChild(d);
      chatBox.scrollTop=chatBox.scrollHeight;
    });

    if(isAdmin){
      db.ref("users").on("value",snap=>{
        let html="";
        snap.forEach(u=>{
          const name=u.key;
          html+=`${name} <button onclick="banUser('${name}')">Ban</button> <button onclick="unbanUser('${name}')">Unban</button><br>`;
        });
        document.getElementById("userList").innerHTML=html;
      });
    }

  })();
}

function sendMsg(){
  if(banned) return;
  const i=document.getElementById("msgInput");
  if(!i.value.trim()) return;
  db.ref("chat").push({name:nickname,text:i.value,time:Date.now()});
  i.value="";
}

function banUser(n){db.ref("bans/"+n).set(true);}
function unbanUser(n){db.ref("bans/"+n).remove();}

// ===== CLEAR + CHANGE NICKNAME =====
function clearChat(){
  if(prompt("Enter code to clear chat:")!=="Ethandagod") return alert("Wrong code");
  db.ref("chat").remove();
  openChat();
}

function changeName(){
  (async()=>{
    while(true){
      let n=prompt("Enter new nickname:");
      if(!n) return;
      const snapshot=await db.ref("users/"+n).get();
      if(snapshot.exists()) { alert("Name already taken. Pick another."); continue; }
      nickname=n;
      localStorage.setItem("nickname",n);
      openChat();
      break;
    }
  })();
}

// ===== YT / GAMES / PROXY =====
function openYT(){
  content.innerHTML=`<input id="ytInput"><button onclick="loadYT()">Load</button><iframe id="ytFrame"></iframe>`;
}
function loadYT(){
  let u=ytInput.value,id="";
  if(u.includes("watch?v="))id=u.split("watch?v=")[1].split("&")[0];
  if(u.includes("youtu.be/"))id=u.split("youtu.be/")[1];
  ytFrame.src="https://www.youtube.com/embed/"+id;
}
function openGames(){window.open("game.html","_blank");}
function openProxy(){window.open("https://boi.ps-wartau.ch/","_blank");}

// ===== FORMAT TIME 12HR WITH TODAY / YESTERDAY / DATE =====
function formatTime(ts){
  const d=new Date(ts),t=new Date();
  const y=new Date(); y.setDate(t.getDate()-1);
  let hours=d.getHours(),minutes=d.getMinutes().toString().padStart(2,"0");
  const ampm=hours>=12?"PM":"AM";
  hours=hours%12||12;
  let dayStr=d.toDateString()===t.toDateString()?"Today":d.toDateString()===y.toDateString()?"Yesterday":d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();
  return `${dayStr} ${hours}:${minutes}${ampm}`;
}
</script>
</body>
</html>
