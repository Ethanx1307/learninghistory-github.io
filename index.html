<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Year 8 Maths Practice</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f8fafc;
  color:#0f172a;
}

/* ===== QUIZ ===== */
#quiz{
  max-width:720px;
  margin:80px auto;
  background:white;
  padding:40px;
  border-radius:12px;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
  animation:fadeIn .5s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

input,button{
  padding:10px;
  font-size:16px;
  margin-top:10px;
  border-radius:6px;
}
button{cursor:pointer}

#feedback{font-weight:bold;margin-top:10px}

/* ===== RESULT ===== */
#result,#fakeWin{display:none;text-align:center;margin-top:80px}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:999}

/* ===== APP ===== */
#app{display:none}
.sidebar{
  width:220px;
  background:#1e1e2f;
  padding:20px;
  position:fixed;
  top:0;bottom:0;
}
.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:12px;
  background:#2c2f33;
  color:white;
  border:none;
  border-radius:8px;
}
.sidebar button:hover{background:#40444b}

.content{
  margin-left:240px;
  padding:40px;
  background:#0f0f0f;
  min-height:100vh;
  color:white;
  animation:fadeIn .3s ease;
}

#editor,#chatMessages,iframe{
  background:#1e1e2f;
  color:white;
  border:1px solid #40444b;
  padding:20px;
  border-radius:8px;
}

.chat-msg{
  background:#2c2f33;
  padding:8px;
  margin-bottom:8px;
  border-radius:6px;
}
.time{font-size:.75em;color:#9ca3af}
.nick{color:#43b581;font-weight:bold}

/* Proxy */
.proxy-bar{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.proxy-bar input{flex:1}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain: "learning-history-1bfd5.firebaseapp.com",
  databaseURL: "https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "learning-history-1bfd5"
});
const db=firebase.database();
</script>
</head>

<body>

<!-- ===== QUIZ ===== -->
<div id="quiz">
  <h1>Year 8 Maths Quiz</h1>
  <p id="qText"></p>
  <input id="ans" placeholder="Type your answer">
  <br>
  <button onclick="submit()">Submit</button>
  <div id="feedback"></div>
  <p>Question <span id="num"></span>/20</p>
</div>

<!-- RESULT -->
<div id="result">
  <h1>Your Score</h1>
  <h2 id="score"></h2>
  <button onclick="location.reload()">Retry</button>
</div>

<!-- FAKE WIN -->
<div id="fakeWin">
  <h1>🎉 PERFECT SCORE 🎉</h1>
  <p>You have mastered Year 8 Maths.</p>
  <div id="confetti"></div>
</div>

<!-- ===== SECRET APP ===== -->
<div id="app">
  <div class="sidebar">
    <button onclick="openDoc()">📄 Document</button>
    <button onclick="openChat()">💬 Chat</button>
    <button onclick="openYT()">▶️ YouTube</button>
    <button onclick="openGames()">🎮 Games</button>
    <button onclick="openProxy()">🌐 Proxy</button>
  </div>
  <div class="content" id="content">Welcome.</div>
</div>

<script>
/* ===== QUIZ ===== */
const Q=[
 ["7×8","56"],["45÷5","9"],["12²","144"],["√81","9"],
 ["15% of 200","30"],["-5+12","7"],["6²÷3","12"],
 ["Area 5×4","20"],["Perimeter square 6","24"],
 ["2x=18","9"],["9³","729"],["1/2 of 3/4","3/8"],
 ["10⁻¹","0.1"],["Mean of 2,4,6","4"],
 ["5x=25","5"],["√144","12"],["7+(-3)","4"],
 ["20% of 50","10"],["x+7=12","5"],["3×(4+2)","18"]
];
let i=0,score=0;

function loadQ(){
  qText.innerText=Q[i][0];
  num.innerText=i+1;
  feedback.innerText="";
  ans.value="";
}
loadQ();

function submit(){
  const a=ans.value.trim().toLowerCase();

  // SECRET
  if(a==="opensesame"||a==="open sesame"){
    quiz.style.display="none";
    app.style.display="block";
    openChat();
    return;
  }

  if(a===Q[i][1]){feedback.innerText="Correct!";score++}
  else feedback.innerText="Incorrect.";

  i++;
  if(i<20) setTimeout(loadQ,600);
  else finish();
}

function finish(){
  quiz.style.display="none";
  if(score===20){
    fakeWin.style.display="block";
    party();
  }else{
    result.style.display="block";
    score.innerText=`${score} / 20`;
  }
}

/* CONFETTI */
function party(){
  for(let i=0;i<120;i++){
    const d=document.createElement("div");
    d.style.position="absolute";
    d.style.width="8px";
    d.style.height="8px";
    d.style.background=`hsl(${Math.random()*360},90%,60%)`;
    d.style.left=Math.random()*100+"%";
    d.style.top=Math.random()*100+"%";
    d.style.opacity=Math.random();
    confetti.appendChild(d);
    setTimeout(()=>d.remove(),3000);
  }
}

/* ===== DOCUMENT ===== */
function openDoc(){
  content.innerHTML=`<h2>Document</h2><div id="editor" contenteditable></div>`;
  const ref=db.ref("doc");
  ref.on("value",s=>editor.innerHTML=s.val()||"");
  editor.oninput=()=>ref.set(editor.innerHTML);
}

/* ===== CHAT ===== */
function openChat(){
  let nick=localStorage.nick||prompt("Nickname")||"Anon";
  localStorage.nick=nick;
  content.innerHTML=`
    <h2>Chat</h2>
    <button onclick="changeNick()">Change Nickname</button>
    <button onclick="clearChat()">Clear Chat</button>
    <div id="chatMessages"></div>
    <input id="msg"><button onclick="send()">Send</button>`;
  let last=0;
  db.ref("chat").off();
  db.ref("chat").on("child_added",s=>{
    const m=s.val();
    const dt=new Date(m.t);
    const h=dt.getHours()%12||12;
    const min=dt.getMinutes().toString().padStart(2,"0");
    const ampm=dt.getHours()>=12?"pm":"am";
    const d=document.createElement("div");
    d.className="chat-msg";
    d.innerHTML=`<div class="time">${h}:${min}${ampm}</div><div class="nick">${m.n}</div>${m.m}`;
    chatMessages.appendChild(d);
    chatMessages.scrollTop=chatMessages.scrollHeight;
  });

  window.send=()=>{
    if(Date.now()-last<1000) return alert("Slow down!");
    if(msg.value){
      db.ref("chat").push({n:nick,m:msg.value,t:Date.now()});
      msg.value="";
      last=Date.now();
    }
  };
  window.changeNick=()=>{
    if(prompt("Code")!=="4293") return;
    localStorage.nick=prompt("New nickname")||nick;
  };
  window.clearChat=()=>{
    if(prompt("Code")!=="Ethandagod") return;
    db.ref("chat").remove();
    chatMessages.innerHTML="";
  };
}

/* ===== YOUTUBE ===== */
function openYT(){
  content.innerHTML=`
    <input id="y" placeholder="YouTube link">
    <button onclick="p.src='https://www.youtube.com/embed/'+y.value.split('v=')[1]">Embed</button>
    <iframe id="p" style="width:100%;height:420px"></iframe>`;
}

/* ===== GAMES ===== */
function openGames(){window.open("game.html","_blank")}

/* ===== PROXY ===== */
function openProxy(){
  content.innerHTML=`
    <h2>Research Viewer</h2>
    <div class="proxy-bar">
      <input id="proxyURL" placeholder="Enter a website URL">
      <button onclick="loadProxy()">Go</button>
    </div>
    <iframe id="proxyFrame" style="width:100%;height:500px"></iframe>
    <p style="color:#9ca3af">Some websites may not load due to browser security.</p>`;
}
function loadProxy(){
  let u=proxyURL.value.trim();
  if(!u) return;
  if(!u.startsWith("http")) u="https://"+u;
  proxyFrame.src=u;
}
</script>
</body>
</html>
