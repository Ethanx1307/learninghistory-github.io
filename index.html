<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Learning Hub</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;}
@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}}
.shake{animation:shake .3s}

#documentView{
  width:100vw;height:100vh;background:#f8fafc;
  display:flex;align-items:center;justify-content:center;
}
.docPage{
  width:800px;background:white;padding:60px;
  box-shadow:0 15px 40px rgba(0,0,0,.25)
}

#app{display:none;height:100vh}
.sidebar{
  width:220px;background:#020617;color:white;
  padding:20px;position:fixed;top:0;bottom:0
}
.sidebar button{
  width:100%;margin-bottom:10px;padding:10px;
  background:#1e293b;color:white;border:none;
  border-radius:6px;cursor:pointer
}
.sidebar button:hover{background:#334155}
.content{
  margin-left:240px;padding:40px;
  background:#f1f5f9;min-height:100vh
}

#editor,#chatMessages{
  background:white;border:1px solid #ccc;
  padding:20px;min-height:300px;
  overflow-y:auto
}

input,button{padding:8px;margin-top:10px;}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="documentView">
  <div class="docPage">
    <h1>Notes</h1>
    <p>Click 5 times to unlock</p>
    <p id="unlockTrigger">Word Count: 1342</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <button onclick="openDoc()">📄 Document</button>
    <button onclick="openChat()">💬 Chat</button>
    <button onclick="openYT()">▶️ YouTube</button>
    <button onclick="openGames()">🎮 Games</button>
  </div>
  <div class="content" id="content">Welcome</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain: "learning-history-1bfd5.firebaseapp.com",
  databaseURL: "https://learning-history-1bfd5-default-rtdb.firebaseio.com",
  projectId: "learning-history-1bfd5",
  storageBucket: "learning-history-1bfd5.appspot.com",
  messagingSenderId: "231811778288",
  appId: "1:231811778288:web:d112859a8bc6143fffa435"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔐 UNLOCK */
let clicks=0;
document.getElementById("unlockTrigger").onclick=()=>{
  clicks++; 
  if(clicks>=5){
    document.getElementById("documentView").style.display="none";
    document.getElementById("app").style.display="block";
    openDoc();
  }
};

/* 📄 DOCUMENT */
function openDoc(){
  content.innerHTML=`
    <h2>Document</h2>
    <button id="editBtn">Unlock Editing</button>
    <div id="editor" contenteditable="false"></div>`;

  const ed = document.getElementById("editor");
  const editBtn = document.getElementById("editBtn");
  const docRef = db.ref("document");

  // Load document content and update in real-time
  docRef.on("value", snapshot => {
    const val = snapshot.val();
    if(val !== null && val !== ed.innerHTML){
      ed.innerHTML = val;
    }
  });

  // Unlock editing
  editBtn.onclick = ()=>{
    const code = prompt("Enter edit code:");
    if(code === "1219"){
      ed.contentEditable = "true";
      alert("You can now edit the document!");
    } else {
      alert("Wrong code!");
      editBtn.classList.add("shake");
      setTimeout(()=>editBtn.classList.remove("shake"),300);
    }
  };

  // Save changes when user stops typing for 1.5s
  let typingTimer;
  ed.addEventListener("input", ()=>{
    if(!ed.isContentEditable) return;
    clearTimeout(typingTimer);
    typingTimer = setTimeout(()=>{
      docRef.set(ed.innerHTML);
    }, 1500);
  });
}

/* 💬 CHAT */
function openChat(){
  let nickname = localStorage.getItem("nickname");
  if(!nickname){
    nickname = prompt("Enter your nickname:");
    if(!nickname) nickname = "Anonymous";
    localStorage.setItem("nickname", nickname);
  }

  content.innerHTML=`
    <h2>Chat</h2>
    <div id="chatMessages" style="max-height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px"></div>
    <input id="msg" placeholder="Type a message"><button id="sendBtn">Send</button>`;

  const box = document.getElementById("chatMessages");
  const input = document.getElementById("msg");
  const sendBtn = document.getElementById("sendBtn");

  // Listen for new messages in real-time
  db.ref("chat").on("child_added", snapshot => {
    const m = snapshot.val();
    const p = document.createElement("p");
    p.innerHTML = `<b>${m.nick}:</b> ${m.msg}`;
    box.appendChild(p);
    box.scrollTop = box.scrollHeight;
  });

  // Send message
  sendBtn.onclick = () => {
    if(input.value.trim()){
      db.ref("chat").push({nick:nickname, msg:input.value.trim()});
      input.value="";
    }
  };

  input.addEventListener("keydown", e=>{
    if(e.key==="Enter") sendBtn.click();
  });
}

/* ▶️ YOUTUBE */
function openYT(){
  content.innerHTML=`
    <input id="yt" placeholder="YouTube URL"><button onclick="embed()">Embed</button>
    <iframe id="player" style="width:100%;height:400px"></iframe>`;
}
function embed(){
  const u=document.getElementById("yt").value;
  const id=u.includes("v=")?u.split("v=")[1].split("&")[0]:u.split("/").pop();
  document.getElementById("player").src="https://www.youtube.com/embed/"+id;
}

/* 🎮 GAMES */
function openGames(){
  window.open("game.html","_blank");
}
</script>
</body>
</html>
