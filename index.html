<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Study Notes</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #2b2d31;
  color: white;
}

/* TOP BAR */
header {
  display: flex;
  background: #1e1f22;
}

header button {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
}

header button.active,
header button:hover {
  background: #313338;
  color: white;
}

/* SECTIONS */
section {
  display: none;
  padding: 10px;
}

section.active {
  display: block;
}

/* CHAT */
#chatBox {
  height: 300px;
  overflow-y: auto;
  background: #313338;
  padding: 10px;
  border-radius: 6px;
}

.msg {
  margin-bottom: 10px;
}

.time {
  font-size: 11px;
  color: #aaa;
}

.name {
  font-weight: bold;
  color: #57a4ff;
}

input {
  width: 70%;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 8px;
  border-radius: 5px;
  border: none;
  background: #5865f2;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.85;
}

/* YOUTUBE */
iframe {
  width: 100%;
  height: 300px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<header>
  <button class="active" onclick="openTab('notes')">Notes</button>
  <button onclick="openTab('chat')">Chat</button>
  <button onclick="openTab('youtube')">YouTube</button>
</header>

<!-- NOTES -->
<section id="notes" class="active">
  <h2>Year 8 Maths Notes</h2>
  <ul>
    <li>Negative × Negative = Positive</li>
    <li>½ of ¾ = ⅜</li>
    <li>a⁻¹ = 1 ÷ a</li>
  </ul>
</section>

<!-- CHAT -->
<section id="chat">
  <div>
    <button onclick="changeName()">Change Nickname</button>
    <button onclick="clearChat()">Clear Chat</button>
  </div>

  <div id="chatBox"></div>

  <input id="msgInput" placeholder="Message">
  <button onclick="sendMsg()">Send</button>
</section>

<!-- YOUTUBE -->
<section id="youtube">
  <input id="ytInput" placeholder="Paste YouTube link here">
  <button onclick="loadYT()">Load Video</button>
  <br><br>
  <iframe id="ytFrame"></iframe>
</section>

<script>
let nickname = localStorage.getItem("nickname") || "Ethan";
let messages = JSON.parse(localStorage.getItem("messages")) || [];

function openTab(id) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll("header button").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

function formatTime(date) {
  const now = new Date();
  const d = new Date(date);

  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

  const diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));

  if (diffDays === 0) return `Today at ${time}`;
  if (diffDays === 1) return `Yesterday at ${time}`;
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} ${time}`;
}

function renderChat() {
  const box = document.getElementById("chatBox");
  box.innerHTML = "";
  messages.forEach(m => {
    box.innerHTML += `
      <div class="msg">
        <div class="time">${formatTime(m.time)}</div>
        <span class="name">${m.name}</span>: ${m.text}
      </div>`;
  });
  box.scrollTop = box.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById("msgInput");
  if (!input.value) return;

  messages.push({
    name: nickname,
    text: input.value,
    time: new Date()
  });

  localStorage.setItem("messages", JSON.stringify(messages));
  input.value = "";
  renderChat();
}

function changeName() {
  const n = prompt("Enter new nickname:");
  if (n) {
    nickname = n;
    localStorage.setItem("nickname", n);
  }
}

function clearChat() {
  if (confirm("Clear all chat messages?")) {
    messages = [];
    localStorage.removeItem("messages");
    renderChat();
  }
}

function loadYT() {
  let url = document.getElementById("ytInput").value;
  let id = "";

  if (url.includes("watch?v=")) {
    id = url.split("watch?v=")[1].split("&")[0];
  } else if (url.includes("youtu.be/")) {
    id = url.split("youtu.be/")[1];
  }

  document.getElementById("ytFrame").src =
    "https://www.youtube.com/embed/" + id;
}

renderChat();
</script>

</body>
</html>
