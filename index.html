<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Math notes</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
}

.container{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#020617;
  padding:20px;
  color:white;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#1e293b;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.sidebar button:hover{
  background:#334155;
}

/* CONTENT */
.content{
  flex:1;
  padding:20px;
  background:#f1f5f9;
}

/* DOCUMENT */
#editor{
  background:white;
  border:1px solid #ccc;
  min-height:300px;
  padding:15px;
}

/* CHAT */
#chatMessages{
  height:260px;
  overflow-y:auto;
  background:white;
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
}

input{
  padding:8px;
  width:75%;
}
button.send{
  padding:8px;
}
</style>
</head>

<body>

<div class="container">
  <div class="sidebar">
    <button onclick="openDoc()">📄 Document</button>
    <button onclick="openChat()">💬 Chat</button>
  </div>

  <div class="content" id="content">
    <h2>Welcome</h2>
    <p>Select Document or Chat</p>
  </div>
</div>

<!-- 🔥 FIREBASE SCRIPTS (HTML FRIENDLY) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ================= FIREBASE SETUP ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain: "learning-history-1bfd5.firebaseapp.com",
  databaseURL: "https://learning-history-1bfd5-default-rtdb.firebaseio.com",
  projectId: "learning-history-1bfd5",
  storageBucket: "learning-history-1bfd5.appspot.com",
  messagingSenderId: "231811778288",
  appId: "1:231811778288:web:d112859a8bc6143fffa435"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= DOCUMENT ================= */
function openDoc(){
  document.getElementById("content").innerHTML = `
    <h2>Live Document</h2>
    <div id="editor" contenteditable="true"></div>
  `;

  const editor = document.getElementById("editor");

  // Load document live
  db.ref("document").on("value", snap => {
    if(snap.exists() && editor.innerHTML !== snap.val()){
      editor.innerHTML = snap.val();
    }
  });

  // Save on typing
  editor.addEventListener("input", () => {
    db.ref("document").set(editor.innerHTML);
  });
}

/* ================= CHAT ================= */
function openChat(){
  document.getElementById("content").innerHTML = `
    <h2>Live Chat</h2>
    <div id="chatMessages"></div>
    <input id="chatInput" placeholder="Type a message">
    <button class="send" onclick="sendMsg()">Send</button>
  `;

  const box = document.getElementById("chatMessages");

  // Load messages live
  db.ref("chat").on("value", snap => {
    box.innerHTML = "";
    if(snap.exists()){
      Object.values(snap.val()).forEach(msg => {
        const p = document.createElement("p");
        p.textContent = msg;
        box.appendChild(p);
      });
      box.scrollTop = box.scrollHeight;
    }
  });
}

function sendMsg(){
  const input = document.getElementById("chatInput");
  if(input.value.trim() === "") return;
  db.ref("chat").push(input.value);
  input.value = "";
}
</script>

</body>
</html>
