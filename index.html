<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Math quiz</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
#quiz{max-width:720px;margin:60px auto;background:#111;padding:40px;border-radius:12px}
#quiz input,#quiz button{padding:10px;font-size:15px;margin-top:8px;border-radius:6px}
#feedback{font-weight:bold;margin-top:10px;color:#fbb}
#app{display:none}
.sidebar{width:220px;background:#1e1e2f;padding:20px;position:fixed;top:0;bottom:0}
.sidebar button{width:100%;margin-bottom:10px;padding:12px;background:#2c2f33;color:white;border:none;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:#40444b}
.content{margin-left:240px;padding:40px;min-height:100vh}
#chatBox{max-height:360px;overflow-y:auto;background:#313338;padding:10px;border-radius:6px;margin-bottom:8px}
.msg{margin-bottom:10px}
.time{font-size:11px;color:#aaa}
.name{font-weight:bold;color:#57a4ff}
input,button{padding:8px;margin-top:5px;border-radius:5px;border:none}
input{width:70%}
button{background:#5865f2;color:white;cursor:pointer}
button:hover{opacity:0.85}
#editor{background:#1e1e2f;border-radius:8px;padding:16px;min-height:400px;width:90%}
iframe{width:100%;height:300px;border-radius:8px;border:none}
.adminBox{background:#1e1e2f;padding:10px;border-radius:8px;margin-top:10px;display:flex;gap:20px;flex-wrap:wrap}
.adminColumn{flex:1;background:#1e1e2f;padding:10px;border-radius:8px;min-width:200px}
.banned{color:#ff6b6b;font-weight:bold}
.onlineUser{color:#4CAF50;font-weight:bold}
.offlineUser{color:#ff4d4d;font-weight:bold}
</style>
</head>
<body>

<section id="quiz">
<h1>Year 8 Maths Quiz</h1>
<p id="q"></p>
<input id="a" placeholder="Type answer here">
<button onclick="submitQ()">Submit</button>
<div id="feedback"></div>
<p>Question <span id="n"></span>/50</p>
</section>

<section id="app">
<div class="sidebar">
<button onclick="openDoc()">📄 Document</button>
<button onclick="openChat()">💬 Chat</button>
<button onclick="openYT()">▶️ YouTube</button>
<button onclick="openGames()">🎮 Games</button>
<button onclick="openProxy()">🌐 Proxy</button>
</div>
<div class="content" id="content">Welcome!</div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
const firebaseConfig={
  apiKey:"AIzaSyDoQ1wN5gdpe4WRhM8WU-DaQn239mj83gA",
  authDomain:"learning-history-1bfd5.firebaseapp.com",
  databaseURL:"https://learning-history-1bfd5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"learning-history-1bfd5",
  storageBucket:"learning-history-1bfd5.appspot.com",
  messagingSenderId:"231811778288",
  appId:"1:231811778288:web:d112859a8bc6143fffa435"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const storage=firebase.storage();

let isAdmin=false;

// ===== QUIZ =====
let questions=[["7×8","56"],["45÷5","9"],["12²","144"],["√81","9"],["15% of 200","30"]];
questions.sort(()=>Math.random()-0.5);

let i=0,score=0;
function submitQ(){
  const v=a.value.trim();
  if(v==="ethandagod@1"){isAdmin=true;unlockApp();return;}
  if(v==="opensesame"||v==="open sesame"){unlockApp();return;}
  if(v===questions[i][1]) score++;
  i++; i<questions.length?loadQ():finishQ();
}
function loadQ(){q.textContent=questions[i][0];n.textContent=i+1;a.value="";}
function finishQ(){quiz.innerHTML=`<h1>Score</h1><h2>${score}/${questions.length}</h2>`;}
function unlockApp(){quiz.style.display="none";app.style.display="block";openChat();}
loadQ();

// ===== CHAT =====
let userId=localStorage.getItem("userId")||Date.now().toString();
localStorage.setItem("userId",userId);
let nickname=localStorage.getItem("nickname");

async function openChat(){
  if(!nickname){
    nickname=prompt("Choose nickname")||"Anonymous";
    localStorage.setItem("nickname",nickname);
  }

  content.innerHTML=`
  <h2>Chat</h2>
  <button onclick="changeName()">Change Nickname</button>
  <button onclick="clearChat()">Clear Chat</button>
  <div id="chatBox"></div>
  <input id="msgInput" placeholder="Type message (paste image with Ctrl+V)">
  <button onclick="sendMsg()">Send</button>
  `;

  const chatBox=document.getElementById("chatBox");
  const msgInput=document.getElementById("msgInput");

  msgInput.addEventListener("paste",async e=>{
    const item=[...e.clipboardData.items].find(i=>i.type.startsWith("image"));
    if(!item) return;
    const file=item.getAsFile();
    const ref=storage.ref(`chatImages/${userId}_${Date.now()}.png`);
    const snap=await ref.put(file);
    const url=await snap.ref.getDownloadURL();
    db.ref("chat").push({name:nickname,img:url,time:Date.now()});
  });

  db.ref("chat").on("child_added",snap=>{
    const m=snap.val();
    const div=document.createElement("div");
    div.className="msg";
    div.innerHTML=m.img
      ? `<div class="time">${formatTime(m.time)}</div><b>${m.name}</b><br><img src="${m.img}" style="max-width:220px;border-radius:6px">`
      : `<div class="time">${formatTime(m.time)}</div><b>${m.name}</b>: ${m.text}`;
    chatBox.appendChild(div);
    chatBox.scrollTop=chatBox.scrollHeight;

    if(m.name!==nickname && !document.hidden){
      new Audio("https://cdn.jsdelivr.net/gh/stephenrsm/discord-sounds/sounds/discord_message.mp3").play();
    }
  });

  window.sendMsg=()=>{
    if(!msgInput.value.trim()) return;
    db.ref("chat").push({name:nickname,text:msgInput.value,time:Date.now()});
    msgInput.value="";
  };
}

// ===== DOCUMENT =====
function openDoc(){
  content.innerHTML=`
  <h2>Document</h2>
  <button onclick="editDoc(false)">Edit</button>
  <button onclick="editDoc(true)">Premium</button>
  <div id="editor" contenteditable="false"></div>`;
  loadDocument(false);
}
async function loadDocument(p){
  const snap=await db.ref(p?"premiumDoc":"doc").once("value");
  editor.innerHTML=snap.val()||"";
}
function editDoc(p){
  const code=p?"12345678h":"1234";
  if(prompt("Enter edit code")!==code) return;
  editor.contentEditable="true";
  editor.oninput=()=>db.ref(p?"premiumDoc":"doc").set(editor.innerHTML);
}

// ===== OTHER =====
function changeName(){nickname=prompt("New nickname")||nickname;localStorage.setItem("nickname",nickname);}
function clearChat(){if(prompt("Code")!=="Ethandagod")return;db.ref("chat").remove();}
function openYT(){content.innerHTML="<iframe src='https://youtube.com'></iframe>";}
function openGames(){window.open("game.html","_blank");}
function openProxy(){window.open("https://boi.ps-wartau.ch/","_blank");}

function formatTime(ts){
  const d=new Date(ts);
  return d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}
</script>
</body>
</html>
